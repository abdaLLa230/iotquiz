<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="screen-orientation" content="portrait">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>سبحة إلكترونية</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
html {
  transform-origin: top left;
}

  :root {
    --gold: #c9a84c;
    --gold-light: #e8c96a;
    --gold-dim: rgba(201,168,76,0.15);
    --gold-border: rgba(201,168,76,0.35);
    --bg: #0e0d0b;
    --bg-2: #161410;
    --bg-3: #1e1b14;
    --text: #f0e6cc;
    --text-muted: #6b6050;
    --text-sub: #9e8c6e;
    --radius: 999px;
  }

  body {
    font-family: 'Amiri', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    gap: 1.2rem;
    padding: 2rem 1.5rem;
    overflow: hidden;
    user-select: none;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 50% 0%, rgba(201,168,76,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 50% 100%, rgba(201,168,76,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  * { position: relative; z-index: 1; }

  .header { text-align: center; }
  .header h1 {
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 700;
    color: var(--gold);
    letter-spacing: .12em;
  }
  .header p { font-size: .85rem; color: var(--text-muted); margin-top: .25rem; letter-spacing: .05em; }

  .milestone {
    padding: .4rem 1.4rem;
    border-radius: var(--radius);
    background: var(--gold-dim);
    border: 1px solid var(--gold-border);
    color: var(--gold-light);
    font-size: .9rem;
    font-weight: 700;
    letter-spacing: .08em;
    opacity: 0;
    transform: translateY(-6px);
    transition: opacity .4s, transform .4s;
    pointer-events: none;
    min-height: 2rem;
  }
  .milestone.show { opacity: 1; transform: translateY(0); }

  .btn-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid var(--gold-border);
    animation: breathe 4s ease-in-out infinite;
  }
  .ring-1 { width: calc(var(--btn-size, 220px) + 44px); height: calc(var(--btn-size, 220px) + 44px); opacity: .4; }
  .ring-2 { width: calc(var(--btn-size, 220px) + 80px); height: calc(var(--btn-size, 220px) + 80px); opacity: .2; animation-delay: .6s; }
  .ring-3 { width: calc(var(--btn-size, 220px) + 116px); height: calc(var(--btn-size, 220px) + 116px); opacity: .1; animation-delay: 1.2s; }

  @keyframes breathe {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.025); }
  }

  .ripple {
    position: absolute;
    border-radius: 50%;
    width: clamp(180px, 44vw, 240px);
    height: clamp(180px, 44vw, 240px);
    border: 2px solid var(--gold);
    opacity: 0;
    pointer-events: none;
  }
  .ripple.go { animation: ripple-out .55s ease-out forwards; }
  @keyframes ripple-out {
    0%   { transform: scale(1); opacity: .5; }
    100% { transform: scale(1.9); opacity: 0; }
  }

  .tap-btn {
    width: clamp(180px, 44vw, 240px);
    height: clamp(180px, 44vw, 240px);
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #2a2519, #111009);
    border: 2px solid var(--gold-border);
    box-shadow:
      0 0 0 1px rgba(201,168,76,.08),
      inset 0 1px 0 rgba(201,168,76,.12),
      0 20px 60px rgba(0,0,0,.6),
      0 0 80px rgba(201,168,76,.06);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: .3rem;
    cursor: pointer;
    transition: transform .1s, box-shadow .1s;
    -webkit-tap-highlight-color: transparent;
    outline: none;
  }
  .tap-btn:active {
    transform: scale(.92);
    box-shadow:
      0 0 0 1px rgba(201,168,76,.15),
      inset 0 1px 0 rgba(201,168,76,.2),
      0 8px 30px rgba(0,0,0,.5),
      0 0 50px rgba(201,168,76,.12);
  }

  .count-num {
    font-size: clamp(3.5rem, 12vw, 5rem);
    font-weight: 700;
    color: var(--gold-light);
    line-height: 1;
  }
  .count-num.pop { animation: pop .2s ease; }
  @keyframes pop {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.12); }
  }
  .count-sub { font-size: .8rem; color: var(--text-muted); letter-spacing: .1em; }

  .progress-wrap { width: min(320px, 88vw); }
  .progress-labels {
    display: flex;
    justify-content: space-between;
    font-size: .78rem;
    color: var(--text-muted);
    margin-bottom: .5rem;
  }
  .progress-track {
    width: 100%;
    height: 4px;
    background: #1e1b14;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid rgba(255,255,255,.04);
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #7a5c1e, var(--gold-light));
    border-radius: var(--radius);
    transition: width .3s ease;
    width: 0%;
  }

  .stats {
    display: flex;
    gap: 1rem;
    width: min(320px, 88vw);
  }
  .stat-card {
    flex: 1;
    background: var(--bg-3);
    border: 1px solid rgba(255,255,255,.05);
    border-radius: 16px;
    padding: .75rem 1rem;
    text-align: center;
  }
  .stat-label { font-size: .72rem; color: var(--text-muted); letter-spacing: .06em; display: block; }
  .stat-val { font-size: 1.3rem; font-weight: 700; color: var(--gold); margin-top: .15rem; display: block; }

  .actions {
    display: flex;
    gap: .75rem;
    width: min(320px, 88vw);
  }
  .action-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: .45rem;
    padding: .85rem;
    border-radius: 14px;
    font-family: 'Amiri', serif;
    font-size: .95rem;
    font-weight: 700;
    cursor: pointer;
    border: 1px solid transparent;
    transition: transform .1s, background .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .action-btn:active { transform: scale(.95); }
  .action-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

  .btn-save { background: var(--gold-dim); border-color: var(--gold-border); color: var(--gold-light); }
  .btn-save:hover { background: rgba(201,168,76,.22); }
  .btn-reset { background: rgba(255,255,255,.03); border-color: rgba(255,255,255,.07); color: var(--text-sub); }
  .btn-reset:hover { background: rgba(255,255,255,.06); }

  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: var(--gold);
    color: #0e0d0b;
    font-family: 'Amiri', serif;
    font-weight: 700;
    font-size: .9rem;
    padding: .5rem 1.6rem;
    border-radius: var(--radius);
    opacity: 0;
    transition: opacity .3s, transform .3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 99;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .ornament { color: var(--text-muted); font-size: .75rem; letter-spacing: .3em; opacity: .5; }
</style>
</head>
<body>

  <div class="header">
    <h1 class="ornament"> ﷽ </h1>
    <p>اضغط للتسبيح  </p>
  </div>

  <div id="milestone" class="milestone">✦ 33 سبحان الله ✦</div>

  <div class="btn-wrap">
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="ring ring-3"></div>
    <div class="ripple" id="ripple"></div>
    <button class="tap-btn" id="tapBtn" onclick="tap()" aria-label="عد تسبيحة">
      <span class="count-num" id="counter">0</span>
      <span class="count-sub">تسبيحة</span>
    </button>
  </div>

  <div class="progress-wrap">
    <div class="progress-labels">
      <span>التقدم للـ 99</span>
      <span id="progressLabel">0 / 99</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <div class="stats">
    <div class="stat-card">
      <span class="stat-label">الجلسة</span>
      <span class="stat-val" id="sessionVal">0</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">الإجمالي</span>
      <span class="stat-val" id="totalVal">0</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">الختمات</span>
      <span class="stat-val" id="roundsVal">0</span>
    </div>
  </div>

  <div class="actions">
    <button class="action-btn btn-save" onclick="save()">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/></svg>
      حفظ
    </button>
    <button class="action-btn btn-reset" onclick="reset()">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
      إعادة
    </button>
  </div>


  <div class="toast" id="toast">✓ تم الحفظ</div>

<script>
  const MILESTONES = {33:'✦ 33 سبحان الله ✦', 66:'✦ 66 الحمد لله ✦', 99:'✦ 99 الله أكبر ✦'};
  let count = 0;
  let total  = +localStorage.getItem('tsb_total')  || 0;
  let rounds = +localStorage.getItem('tsb_rounds') || 0;

  const elCount   = document.getElementById('counter');
  const elProg    = document.getElementById('progressFill');
  const elProgLbl = document.getElementById('progressLabel');
  const elSession = document.getElementById('sessionVal');
  const elTotal   = document.getElementById('totalVal');
  const elRounds  = document.getElementById('roundsVal');
  const elMile    = document.getElementById('milestone');
  const elRipple  = document.getElementById('ripple');
  const elToast   = document.getElementById('toast');

  elTotal.textContent  = total;
  elRounds.textContent = rounds;

  function tap() {
    count++;
    elCount.textContent = count;
    elCount.classList.remove('pop');
    void elCount.offsetWidth;
    elCount.classList.add('pop');
    elRipple.classList.remove('go');
    void elRipple.offsetWidth;
    elRipple.classList.add('go');
    elSession.textContent = count;
    const inCycle = count % 99 || 99;
    elProg.style.width = (inCycle / 99 * 100) + '%';
    elProgLbl.textContent = inCycle + ' / 99';
    if (MILESTONES[inCycle]) showMilestone(MILESTONES[inCycle]);
    if (count > 0 && count % 99 === 0) {
      rounds++;
      elRounds.textContent = rounds;
      localStorage.setItem('tsb_rounds', rounds);
    }
  }

  function showMilestone(txt) {
    elMile.textContent = txt;
    elMile.classList.add('show');
    clearTimeout(elMile._t);
    elMile._t = setTimeout(() => elMile.classList.remove('show'), 2500);
  }

  function save() {
    total += count;
    localStorage.setItem('tsb_total', total);
    elTotal.textContent = total;
    count = 0;
    elCount.textContent = '0';
    elSession.textContent = '0';
    elProg.style.width = '0%';
    elProgLbl.textContent = '0 / 99';
    elToast.classList.add('show');
    clearTimeout(elToast._t);
    elToast._t = setTimeout(() => elToast.classList.remove('show'), 2000);
  }

  function reset() {
    count = 0;
    elCount.textContent = '0';
    elSession.textContent = '0';
    elProg.style.width = '0%';
    elProgLbl.textContent = '0 / 99';
  }
</script>
</body>
</html>
