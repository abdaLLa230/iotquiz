<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ethical Hacking Test Bank</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e17;
    --surface: #0f1623;
    --card: #131c2e;
    --border: #1e2d47;
    --accent: #00e5ff;
    --accent2: #7b2fff;
    --correct: #00e676;
    --wrong: #ff1744;
    --warn: #ffab00;
    --text: #c8d6e8;
    --muted: #4a6080;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Rajdhani', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 16px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow blobs */
  body::after {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(123,47,255,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 0 20px 60px; }

  /* Header */
  header {
    padding: 40px 0 30px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 30px;
  }

  .header-tag {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 10px;
    opacity: 0.8;
  }

  h1 {
    font-family: var(--sans);
    font-size: clamp(28px, 5vw, 46px);
    font-weight: 700;
    letter-spacing: 2px;
    color: #fff;
    line-height: 1.1;
  }

  h1 span {
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,229,255,0.5);
  }

  .subtitle {
    margin-top: 10px;
    color: var(--muted);
    font-size: 15px;
    font-family: var(--mono);
  }

  /* Controls */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 28px;
    align-items: center;
  }

  .btn {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 10px 20px;
    border: 1px solid;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
  }

  .btn-primary {
    border-color: var(--accent);
    color: var(--accent);
  }
  .btn-primary:hover { background: rgba(0,229,255,0.1); box-shadow: 0 0 12px rgba(0,229,255,0.2); }

  .btn-secondary {
    border-color: var(--accent2);
    color: var(--accent2);
  }
  .btn-secondary:hover { background: rgba(123,47,255,0.1); box-shadow: 0 0 12px rgba(123,47,255,0.2); }

  .btn-warn {
    border-color: var(--warn);
    color: var(--warn);
  }
  .btn-warn:hover { background: rgba(255,171,0,0.1); }

  .mode-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-left: auto;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }

  .toggle-switch {
    width: 40px; height: 22px;
    background: var(--border);
    border-radius: 11px;
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
  }
  .toggle-switch.on { background: var(--accent2); }
  .toggle-switch::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 16px; height: 16px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.2s;
  }
  .toggle-switch.on::after { transform: translateX(18px); }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 20px;
    margin-bottom: 24px;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 13px;
    flex-wrap: wrap;
  }

  .stat { display: flex; gap: 8px; align-items: center; }
  .stat-label { color: var(--muted); }
  .stat-val { color: #fff; font-weight: bold; }
  .stat-val.green { color: var(--correct); }
  .stat-val.red { color: var(--wrong); }
  .stat-val.blue { color: var(--accent); }

  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 28px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* Filter tabs */
  .filter-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .tab {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 1px;
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
    color: var(--muted);
    background: transparent;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .tab:hover { border-color: var(--accent); color: var(--accent); }
  .tab.active { border-color: var(--accent); color: var(--accent); background: rgba(0,229,255,0.07); }

  /* Search */
  .search-box {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 24px;
    padding: 10px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    transition: border-color 0.2s;
  }
  .search-box:focus-within { border-color: var(--accent); }
  .search-box input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
  }
  .search-icon { color: var(--muted); font-size: 14px; }

  /* Question card */
  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 16px;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .question-card:hover { border-color: rgba(0,229,255,0.2); }
  .question-card.answered-correct { border-color: rgba(0,230,118,0.3); }
  .question-card.answered-wrong { border-color: rgba(255,23,68,0.3); }

  .question-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 18px 20px 14px;
    cursor: pointer;
    user-select: none;
  }

  .q-number {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent2);
    background: rgba(123,47,255,0.12);
    border: 1px solid rgba(123,47,255,0.3);
    padding: 3px 8px;
    border-radius: 3px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .q-text {
    font-size: 15px;
    font-weight: 600;
    color: #dce8f8;
    line-height: 1.5;
    flex: 1;
  }

  .q-status {
    font-size: 18px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  /* Answers */
  .answers {
    padding: 0 20px 16px;
    display: grid;
    gap: 8px;
  }

  .answer-option {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 14px;
    border: 1px solid var(--border);
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 14px;
    font-weight: 500;
    background: rgba(255,255,255,0.02);
  }

  .answer-option:hover:not(.disabled) {
    border-color: rgba(0,229,255,0.35);
    background: rgba(0,229,255,0.06);
  }

  .answer-option.correct {
    border-color: var(--correct);
    background: rgba(0,230,118,0.08);
    color: var(--correct);
  }

  .answer-option.wrong {
    border-color: var(--wrong);
    background: rgba(255,23,68,0.08);
    color: var(--wrong);
  }

  .answer-option.reveal-correct {
    border-color: rgba(0,230,118,0.5);
    background: rgba(0,230,118,0.05);
    color: rgba(0,230,118,0.7);
  }

  .answer-option.disabled { cursor: default; }

  .option-letter {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: bold;
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid currentColor;
    border-radius: 3px;
    flex-shrink: 0;
    opacity: 0.7;
  }

  /* Essay section */
  .section-divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 40px 0 28px;
  }
  .section-divider::before, .section-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .section-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent2);
    text-transform: uppercase;
    white-space: nowrap;
  }

  .essay-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 14px;
    overflow: hidden;
  }

  .essay-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 16px 20px;
    cursor: pointer;
    user-select: none;
  }

  .essay-header:hover { background: rgba(255,255,255,0.02); }

  .essay-q {
    font-size: 14px;
    font-weight: 600;
    color: #dce8f8;
    flex: 1;
    line-height: 1.5;
  }

  .essay-chevron {
    font-size: 12px;
    color: var(--muted);
    transition: transform 0.2s;
    flex-shrink: 0;
    margin-top: 3px;
  }
  .essay-card.open .essay-chevron { transform: rotate(180deg); }

  .essay-answer {
    display: none;
    padding: 0 20px 18px;
    border-top: 1px solid var(--border);
    margin-top: 0;
  }
  .essay-card.open .essay-answer { display: block; }

  .answer-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin: 14px 0 10px;
  }

  .essay-answer ul {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .essay-answer li {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    font-size: 14px;
    color: var(--text);
    line-height: 1.5;
  }

  .essay-answer li::before {
    content: '▸';
    color: var(--accent2);
    flex-shrink: 0;
    margin-top: 1px;
    font-size: 11px;
  }

  /* Pagination */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 32px;
    flex-wrap: wrap;
  }

  .page-btn {
    font-family: var(--mono);
    font-size: 12px;
    padding: 7px 13px;
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    color: var(--muted);
    background: transparent;
    transition: all 0.15s;
  }
  .page-btn:hover { border-color: var(--accent); color: var(--accent); }
  .page-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,229,255,0.08); }
  .page-btn:disabled { opacity: 0.3; cursor: default; }

  /* Tooltip */
  .score-ring {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: conic-gradient(var(--accent) 0% var(--pct, 0%), var(--border) var(--pct, 0%) 100%);
    display: flex; align-items: center; justify-content: center;
    margin-left: auto;
    flex-shrink: 0;
  }
  .score-ring-inner {
    width: 42px; height: 42px;
    background: var(--surface);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    font-weight: bold;
  }

  .hidden { display: none !important; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="header-tag">// Test Bank v1.0</div>
    <h1>ETHICAL <span>HACKING</span></h1>
    <div class="subtitle">230 MCQ + 50 Essay Questions · Answers shuffled on each load</div>
  </header>

  <div class="controls">
    <button class="btn btn-primary" onclick="reshuffleAll()">⟳ Reshuffle Answers</button>
    <button class="btn btn-secondary" onclick="resetAll()">↺ Reset Progress</button>
    <button class="btn btn-warn" onclick="revealAll()">⚡ Reveal All</button>
    <div class="mode-toggle">
      <span>Study Mode</span>
      <div class="toggle-switch" id="studyToggle" onclick="toggleStudyMode()"></div>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat"><span class="stat-label">Questions:</span><span class="stat-val blue" id="statTotal">230</span></div>
    <div class="stat"><span class="stat-label">Answered:</span><span class="stat-val" id="statAnswered">0</span></div>
    <div class="stat"><span class="stat-label">Correct:</span><span class="stat-val green" id="statCorrect">0</span></div>
    <div class="stat"><span class="stat-label">Wrong:</span><span class="stat-val red" id="statWrong">0</span></div>
    <div class="stat"><span class="stat-label">Score:</span><span class="stat-val" id="statScore">—</span></div>
    <div class="score-ring" id="scoreRing" style="--pct:0%">
      <div class="score-ring-inner" id="scoreRingText">0%</div>
    </div>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

  <div class="filter-tabs">
    <button class="tab active" onclick="setFilter('all',this)">All (230)</button>
    <button class="tab" onclick="setFilter('unanswered',this)">Unanswered</button>
    <button class="tab" onclick="setFilter('correct',this)">Correct</button>
    <button class="tab" onclick="setFilter('wrong',this)">Wrong</button>
  </div>

  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" placeholder="Search questions..." id="searchInput" oninput="onSearch()">
  </div>

  <div id="questionsContainer"></div>

  <div class="pagination" id="pagination"></div>

  <div class="section-divider"><span class="section-label">Essay Questions</span></div>

  <div id="essayContainer"></div>

</div>

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let questions = [];
let userAnswers = {};
let studyMode = false;
let currentFilter = 'all';
let searchQuery = '';
let currentPage = 1;
const PER_PAGE = 20;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function initQuestions() {
  questions = rawQuestions.map((q, idx) => {
    const indices = q.options.map((_, i) => i);
    const shuffled = shuffle(indices);
    const newCorrect = shuffled.indexOf(q.correct);
    return {
      id: idx,
      q: q.q,
      options: shuffled.map(i => q.options[i]),
      correct: newCorrect,
    };
  });
}

function getFilteredQuestions() {
  let filtered = questions;
  if (searchQuery) {
    const sq = searchQuery.toLowerCase();
    filtered = filtered.filter(q => q.q.toLowerCase().includes(sq) || q.options.some(o => o.toLowerCase().includes(sq)));
  }
  if (currentFilter === 'unanswered') filtered = filtered.filter(q => userAnswers[q.id] === undefined);
  else if (currentFilter === 'correct') filtered = filtered.filter(q => userAnswers[q.id] === q.correct);
  else if (currentFilter === 'wrong') filtered = filtered.filter(q => userAnswers[q.id] !== undefined && userAnswers[q.id] !== q.correct);
  return filtered;
}

function getStats() {
  const answered = Object.keys(userAnswers).length;
  const correct = Object.values(userAnswers).reduce((acc, val, idx) => {
    const qid = Object.keys(userAnswers)[idx];
    return acc + (val === questions[qid]?.correct ? 1 : 0);
  }, 0);
  let c = 0, w = 0;
  for (const [id, ans] of Object.entries(userAnswers)) {
    if (ans === questions[id]?.correct) c++;
    else w++;
  }
  return { answered, correct: c, wrong: w };
}

function updateStats() {
  const { answered, correct, wrong } = getStats();
  document.getElementById('statAnswered').textContent = answered;
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent = wrong;
  const pct = answered > 0 ? Math.round((correct / answered) * 100) : 0;
  document.getElementById('statScore').textContent = answered > 0 ? `${pct}%` : '—';
  document.getElementById('progressFill').style.width = `${(answered / questions.length) * 100}%`;
  const ring = document.getElementById('scoreRing');
  ring.style.setProperty('--pct', pct + '%');
  document.getElementById('scoreRingText').textContent = pct + '%';
}

function renderPage() {
  const filtered = getFilteredQuestions();
  const totalPages = Math.ceil(filtered.length / PER_PAGE);
  if (currentPage > totalPages) currentPage = Math.max(1, totalPages);
  const start = (currentPage - 1) * PER_PAGE;
  const pageQs = filtered.slice(start, start + PER_PAGE);

  const container = document.getElementById('questionsContainer');
  container.innerHTML = '';

  pageQs.forEach((q, localIdx) => {
    const globalIdx = questions.indexOf(q);
    const answered = userAnswers[q.id];
    const isCorrect = answered === q.correct;
    const isWrong = answered !== undefined && !isCorrect;

    const card = document.createElement('div');
    card.className = `question-card ${answered !== undefined ? (isCorrect ? 'answered-correct' : 'answered-wrong') : ''}`;

    const status = answered !== undefined ? (isCorrect ? '✓' : '✗') : '';
    const statusColor = isCorrect ? 'var(--correct)' : isWrong ? 'var(--wrong)' : '';

    card.innerHTML = `
      <div class="question-header">
        <div class="q-number">Q${globalIdx + 1}</div>
        <div class="q-text">${q.q}</div>
        <div class="q-status" style="color:${statusColor}">${status}</div>
      </div>
      <div class="answers">
        ${q.options.map((opt, i) => {
          let cls = 'answer-option';
          if (answered !== undefined) {
            cls += ' disabled';
            if (i === q.correct) cls += studyMode ? ' reveal-correct' : ' correct';
            else if (i === answered && answered !== q.correct) cls += ' wrong';
          }
          const letters = ['A','B','C','D'];
          return `<div class="${cls}" onclick="selectAnswer(${q.id}, ${i})">
            <span class="option-letter">${letters[i]}</span>
            ${opt}
          </div>`;
        }).join('')}
      </div>`;
    container.appendChild(card);
  });

  // Pagination
  renderPagination(filtered.length, totalPages);
  updateStats();
}

function renderPagination(total, totalPages) {
  const pag = document.getElementById('pagination');
  pag.innerHTML = '';
  if (totalPages <= 1) return;

  const addBtn = (label, page, active, disabled) => {
    const btn = document.createElement('button');
    btn.className = 'page-btn' + (active ? ' active' : '');
    btn.textContent = label;
    btn.disabled = disabled;
    btn.onclick = () => { currentPage = page; renderPage(); window.scrollTo({top:0,behavior:'smooth'}); };
    pag.appendChild(btn);
  };

  addBtn('← Prev', currentPage - 1, false, currentPage === 1);

  const range = [];
  for (let i = 1; i <= totalPages; i++) {
    if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) range.push(i);
    else if (range[range.length-1] !== '…') range.push('…');
  }

  range.forEach(p => {
    if (p === '…') {
      const span = document.createElement('span');
      span.textContent = '…';
      span.style.cssText = 'color:var(--muted);font-family:var(--mono);font-size:12px;padding:0 4px;';
      pag.appendChild(span);
    } else addBtn(p, p, p === currentPage, false);
  });

  addBtn('Next →', currentPage + 1, false, currentPage === totalPages);
}

function selectAnswer(qid, optIdx) {
  if (userAnswers[qid] !== undefined) return;
  userAnswers[qid] = optIdx;
  renderPage();
}

function renderEssays() {
  const container = document.getElementById('essayContainer');
  container.innerHTML = '';
  essayQuestions.forEach((eq, i) => {
    const card = document.createElement('div');
    card.className = 'essay-card';
    card.innerHTML = `
      <div class="essay-header" onclick="toggleEssay(this)">
        <div class="q-number">E${i+1}</div>
        <div class="essay-q">${eq.q}</div>
        <div class="essay-chevron">▼</div>
      </div>
      <div class="essay-answer">
        <div class="answer-label">// Model Answer</div>
        <ul>${eq.answer.map(a => `<li>${a}</li>`).join('')}</ul>
      </div>`;
    container.appendChild(card);
  });
}

function toggleEssay(header) {
  const card = header.closest('.essay-card');
  card.classList.toggle('open');
}

function reshuffleAll() {
  userAnswers = {};
  initQuestions();
  currentPage = 1;
  renderPage();
}

function resetAll() {
  userAnswers = {};
  renderPage();
}

function revealAll() {
  const filtered = getFilteredQuestions();
  const start = (currentPage - 1) * PER_PAGE;
  const pageQs = filtered.slice(start, start + PER_PAGE);
  pageQs.forEach(q => {
    if (userAnswers[q.id] === undefined) {
      userAnswers[q.id] = studyMode ? -1 : q.correct;
    }
  });
  renderPage();
}

function setFilter(f, btn) {
  currentFilter = f;
  currentPage = 1;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderPage();
}

function onSearch() {
  searchQuery = document.getElementById('searchInput').value;
  currentPage = 1;
  renderPage();
}

function toggleStudyMode() {
  studyMode = !studyMode;
  const t = document.getElementById('studyToggle');
  t.classList.toggle('on', studyMode);
  renderPage();
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
initQuestions();
renderPage();
renderEssays();
</script>
