<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O6U Communication Skills Study Hub</title>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #334155;
    --border: #475569;
    --accent: #14b8a6;
    --accent-hover: #0d9488;
    --green: #10b981;
    --red: #f43f5e;
    --text: #f8fafc;
    --muted: #94a3b8;
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; min-height: 100vh; line-height: 1.5; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo-wrap { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    background: rgba(20, 184, 166, 0.15);
    color: var(--accent);
    padding: 8px;
    border-radius: 12px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo-text h1 { font-size: 16px; font-weight: 800; tracking-wide: 0.5px; }
  .logo-text p { font-size: 11px; color: var(--muted); }

  .header-controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

  select, button {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  select:hover, button:hover { border-color: var(--accent); }
  select:focus { outline: none; border-color: var(--accent); }
  .btn-primary { background: var(--accent); color: #0f172a; border-color: var(--accent); }
  .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    padding: 24px 24px 0;
    max-width: 860px;
    margin: 0 auto;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    text-align: center;
    transition: transform 0.2s;
  }
  .stat-val { font-size: 26px; font-weight: 900; }
  .stat-lbl { font-size: 10px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 1px; }
  .val-green { color: var(--green); }
  .val-red { color: var(--red); }
  .val-accent { color: var(--accent); }

  .progress-wrap { padding: 18px 24px 0; max-width: 860px; margin: 0 auto; }
  .progress-track { height: 8px; background: #020617; border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); border-radius: 4px; transition: width 0.3s ease; }
  .progress-label { font-size: 11px; color: var(--muted); margin-top: 6px; display: flex; justify-content: space-between; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

  main { max-width: 860px; margin: 0 auto; padding: 24px 24px 60px; }

  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 20px;
    transition: all 0.2s ease;
  }
  .q-card.correct-card { border-color: rgba(16, 185, 129, 0.4); box-shadow: 0 4px 20px rgba(16, 185, 129, 0.05); }
  .q-card.wrong-card { border-color: rgba(244, 63, 94, 0.4); box-shadow: 0 4px 20px rgba(244, 63, 94, 0.05); }

  .q-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .q-num { font-size: 12px; font-weight: 800; color: var(--accent); background: rgba(20, 184, 166, 0.1); padding: 4px 10px; border-radius: 8px; }
  .q-badge {
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 8px;
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .q-text { font-size: 16px; font-weight: 700; line-height: 1.6; margin-bottom: 18px; color: #f8fafc; }

  .options { display: grid; gap: 10px; }
  .opt {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: rgba(15, 23, 42, 0.3);
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    line-height: 1.4;
    text-align: left;
    color: var(--text);
    transition: all 0.15s ease;
    width: 100%;
  }
  .opt:not(:disabled):hover { border-color: var(--accent); background: rgba(20, 184, 166, 0.05); }
  .opt:disabled { cursor: default; }
  .opt.opt-correct { border-color: var(--green); background: rgba(16, 185, 129, 0.1); color: #a7f3d0; }
  .opt.opt-wrong { border-color: var(--red); background: rgba(244, 63, 94, 0.1); color: #fecdd3; }
  
  .opt-label {
    min-width: 26px;
    height: 26px;
    border-radius: 6px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 850;
    color: var(--muted);
    flex-shrink: 0;
  }
  .opt-correct .opt-label { background: var(--green); color: #022c22; }
  .opt-wrong .opt-label { background: var(--red); color: #4c0519; }

  .sa-input {
    width: 100%;
    background: #0f172a;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    resize: none;
    margin-bottom: 10px;
    transition: border-color 0.15s;
  }
  .sa-input:focus { outline: none; border-color: var(--accent); }
  .sa-input:disabled { opacity: 0.7; }

  .feedback { font-size: 13px; margin-top: 14px; padding: 12px; border-radius: 10px; background: rgba(15, 23, 42, 0.5); border: 1px solid var(--border); line-height: 1.6; }
  .feedback.fb-correct { color: #6ee7b7; border-color: rgba(16, 185, 129, 0.2); }
  .feedback.fb-wrong { color: #fca5a5; border-color: rgba(244, 63, 94, 0.2); }
  .feedback-title { font-weight: 800; text-transform: uppercase; font-size: 10px; tracking-wide: 0.5px; margin-bottom: 4px; display: block; }

  .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; flex-wrap: wrap; gap: 12px; }
  .page-info { font-size: 13px; color: var(--muted); font-weight: 700; }

  footer {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 24px;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-top: auto;
  }
  footer p { margin-bottom: 4px; }

  @media(max-width:600px){
    .stats-bar { grid-template-columns: repeat(2,1fr); }
    .stat-val { font-size: 22px; }
    header { padding: 12px 16px; }
    main { padding: 16px; }
  }
</style>
</head>

    <div class="logo-icon">O6U</div>

<div class="stats-bar">

<div class="progress-wrap">

<script>
const QUESTIONS_DATABASE = [
  // --- LECTURE 1 ---
  {n:1,s:"L1",type:"tf",q:"Communication is the lifeline of society and social organizations.",opts:["True","False"],ans:0,exp:"According to Slide 2 of Lecture 1, communication is the vital process that sustains both human society and business/social organizations."},
  {n:2,s:"L1",type:"tf",q:"An organization can hardly be conceived without communication.",opts:["True","False"],ans:0,exp:"Communication is what links individuals, machinery, and management together; without it, cohesive organization is impossible."},
  {n:3,s:"L1",type:"tf",q:"In the absence of one of the most essential gradients like communication, an organization would turn into a mere assembly of unrelated and organized individuals, materials and machines and tools, which neither makes any sense nor, in fact, any kind of organization.",opts:["True","False"],ans:0,exp:"The lack of communication breaks structural relationships, turning a structured group into a meaningless assembly of unrelated elements."},
  {n:4,s:"L1",type:"tf",q:"Prevalence of unperturbed and meaningful communication system, which is called ineffective communication.",opts:["True","False"],ans:1,exp:"Correction: A meaningful, unperturbed, and stable communication system is referred to as EFFECTIVE communication, not ineffective."},
  {n:5,s:"L1",type:"tf",q:"The study of communication in management education and operation of an organization has been quite unavoidable.",opts:["True","False"],ans:0,exp:"Modern management operations absolutely depend on communication, making its study essential and unavoidable."},
  {n:6,s:"L1",type:"tf",q:"Regular training and refreshment is always provided to people in an organization to maintain Effective Communication.",opts:["True","False"],ans:0,exp:"Organizations conduct recurring training seminars and refreshers to prevent degradation of their communication standards."},
  {n:7,s:"L1",type:"tf",q:"Man used to communicate with his fellow beings by means of sounds, signals, gestures when there was no language developed.",opts:["True","False"],ans:0,exp:"Historically, nonverbal channels like basic sounds, signal fires, and natural gestures predated structured verbal systems."},
  {n:8,s:"L1",type:"tf",q:"The word communication has been derived from the Latin word 'communis', meaning to share. It basically involves a sender, a message and a receiver.",opts:["True","False"],ans:0,exp:"Communication is lexically rooted in 'communis' (common / to share). The process core contains the Sender, Message, and Receiver."},
  {n:9,s:"L1",type:"tf",q:"Communication is usually a two-way process.",opts:["True","False"],ans:0,exp:"It is not merely a transmission; it includes transmission, receiving, understanding, and feedback from the recipient."},
  {n:10,s:"L1",type:"tf",q:"Communication, therefore, involves more than one person.",opts:["True","False"],ans:0,exp:"Because it relies on sharing information between a sender and at least one receiver, it requires multiple participants."},
  {n:11,s:"L1",type:"tf",q:"Minus communication, human society could have been as it is today.",opts:["True","False"],ans:1,exp:"Correction: Without the capacity to communicate, complex human cultures, rules, technologies, and societies could never have evolved."},
  {n:12,s:"L1",type:"mc",q:"Communication is the lifeline of society and __________ organizations.",opts:["a. business","b. social"],ans:1,exp:"While communication is critical to business, the general text sentence defines it as 'the lifeline of society and social organizations'."},
  {n:13,s:"L1",type:"mc",q:"An organization can hardly be conceived _________.",opts:["a. Without communication","b. with communication"],ans:0,exp:"No coordinated operations can exist without constant transmission of tasks, requirements, and responses."},
  {n:14,s:"L1",type:"mc",q:"In the absence of one of the most essential gradients like communication, an organization would turn into a mere assembly of __________ and unorganized individuals, materials and machines and tools, which neither makes any sense nor, in fact, any kind of organization.",opts:["a. related","b. unrelated"],ans:1,exp:"Without structural connections formed through messaging, components are entirely unrelated."},
  {n:15,s:"L1",type:"mc",q:"Prevalence of unperturbed and meaningful communication system, which is called __________ communication.",opts:["a. effective","b. ineffective"],ans:0,exp:"A healthy, uninterrupted, and accurately comprehended message delivery cycle is the definition of effective communication."},
  {n:16,s:"L1",type:"mc",q:"The study of communication in management education and operation of an organization has been quite __________.",opts:["a. unavoidable","b. avoidable"],ans:0,exp:"Management relies directly on organizing and leading, both of which are rooted entirely in communication, making its study crucial."},
  {n:17,s:"L1",type:"mc",q:"Regular training and refreshment is always provided to people in an organization to maintain __________ Communication.",opts:["a. effective","b. ineffective"],ans:0,exp:"Regular sessions ensure workers maintain high efficiency, accuracy, and professional standards in their interactions."},
  {n:18,s:"L1",type:"mc",q:"Regular training and refreshment is always provided to people in an organization to __________ Effective Communication.",opts:["a. increase","b. maintain"],ans:1,exp:"The explicit primary objective stated in your curriculum slides is to 'maintain' established standards of Effective Communication."},
  {n:19,s:"L1",type:"tf",q:"The word communication has been derived from the Latin word 'communis', meaning to share. It basically involves a sender, a message and a receiver. (Re-evaluation Question)",opts:["True","False"],ans:0,exp:"This is a duplicate test point re-confirming the fundamental Latin origin and the primary structure of information exchanges."},
  {n:20,s:"L1",type:"mc",q:"The word communication has been derived from the Latin word 'communis', meaning to share. It basically involves __________.",opts:["a. a sender, a message and a receiver","b. a sender, a message only"],ans:0,exp:"Without a receiver, there is no sharing, making the entire cycle incomplete and failing the Latin concept of 'communis'."},
  {n:21,s:"L1",type:"mc",q:"Communication, therefore, involves __________.",opts:["a. one person","b. more than one person"],ans:1,exp:"Sharing is inherently a social act that requires a minimum of a sending entity and a receiving partner."},
  {n:22,s:"L1",type:"mc",q:"Communication is the activity of conveying __________.",opts:["a. information","b. data","c. Characters"],ans:0,exp:"Communication is defined as conveying contextual, meaningful 'information' rather than raw characters or unanalyzed symbols."},
  {n:23,s:"L1",type:"mc",q:"Communication is usually a (one / two / multi) way process. It is not just giving information or signaling someone; it also involves the (composition / comprehension / completion) of the information or the signal by the receiver.",opts:["a. two / comprehension","b. multi / composition","c. one / completion"],ans:0,exp:"It is a two-way process that is finished when the receiver exhibits successful 'comprehension' of the transmitted concept."},
  {n:24,s:"L1",type:"sa",q:"What is Communication?",ans:"Communication is a dynamic, usually two-way process derived from the Latin word 'communis' (meaning to share). It involves more than one person—specifically a sender, a message, and a receiver—and consists of conveying information, ideas, or signals in a way that ensures mutual understanding and comprehension by the receiving party.",exp:"This is a key open-ended definition. Memorize terms: Latin 'communis', 2-way process, sender-message-receiver, mutual understanding."},

  // --- LECTURES 2 & 3 ---
  {n:25,s:"L23",type:"tf",q:"Communication is the act of conveying intended meaning from one entity or group to another through the use of mutually understood signs or semiotic rules.",opts:["True","False"],ans:0,exp:"Conveying intended meaning using mutually understood signs is a comprehensive, scientific description of communication."},
  {n:26,s:"L23",type:"tf",q:"Communication is a composite of information given and received.",opts:["True","False"],ans:0,exp:"It represents a dual-directional interaction involving both transmission and acceptance."},
  {n:27,s:"L23",type:"tf",q:"Communication is a composite of a listening effort by some involved.",opts:["True","False"],ans:1,exp:"Correction: True communication requires an active listening commitment from ALL parties involved, not just some."},
  {n:28,s:"L23",type:"tf",q:"Communication is a composite a sympathetic fresh examination of issues by communicator himself.",opts:["True","False"],ans:0,exp:"An effective communicator must continually re-examine and adapt their own viewpoints and approaches dynamically."},
  {n:29,s:"L23",type:"tf",q:"Communication is a composite a sensitive interaction of points of view leading to a higher level of shared understanding and common intention.",opts:["True","False"],ans:0,exp:"Successful communication elevates collaborative environments by fostering consensus and cooperative alignment."},
  {n:30,s:"L23",type:"tf",q:"Communication is a composite a sensitive interaction of points of view leading to a lower level of shared understanding and common intention.",opts:["True","False"],ans:1,exp:"Correction: True communication aims to elevate mutual consensus to a higher, more cohesive operational standard."},
  {n:31,s:"L23",type:"tf",q:"Communication is a composite a sensitive interaction of points of view leading to a higher level of shared understanding and different intention.",opts:["True","False"],ans:1,exp:"Correction: Successful resolution aligns stakeholders toward a 'common' cooperative goal or intention."},
  {n:32,s:"L23",type:"tf",q:"Communication is the intercourse by words, letters or messages.",opts:["True","False"],ans:0,exp:"This is a direct classical definition of interpersonal transactional exchanges."},
  {n:33,s:"L23",type:"tf",q:"Communication is the process of passing information and understanding from one person to another.",opts:["True","False"],ans:0,exp:"Passing both factual material and cognitive understanding is essential to perfect communication."},
  {n:34,s:"L23",type:"tf",q:"It is communication that binds people and society together. It is considered as a natural process.",opts:["True","False"],ans:0,exp:"Human communities rely on natural communication habits to preserve order, form bonds, and construct civilizations."},
  {n:35,s:"L23",type:"tf",q:"Society moves on human interactions and exchange of ideas, thoughts only.",opts:["True","False"],ans:1,exp:"Correction: Human communities also depend profoundly on the sharing of personal 'feelings' and subjective moods."},
  {n:36,s:"L23",type:"tf",q:"Relationship builds up through communication.",opts:["True","False"],ans:0,exp:"Shared experiences, trust, and structural ties rely directly on clear and transparent dialogue."},
  {n:37,s:"L23",type:"tf",q:"Lack of communication among the people in society will severely unaffected social cohesion and cohabitation.",opts:["True","False"],ans:1,exp:"Correction: A severe breakdown in dialogue profoundly details and HARMS social cohesion and communal cohabitation."},
  {n:38,s:"L23",type:"tf",q:"Progress and prosperity will come to a standstill if there is effective communication.",opts:["True","False"],ans:1,exp:"Correction: Progress stops when systems fail due to INEFFECTIVE exchanges; healthy channels drive growth and coordination."},
  {n:39,s:"L23",type:"tf",q:"Communication is a factor of building and maintaining bad relations. It enables people to understand each other.",opts:["True","False"],ans:1,exp:"Correction: Communication is designed to create, sustain, and develop positive, constructive ('good') human relationships."},
  {n:40,s:"L23",type:"tf",q:"Communication is as important and meaningful in individual life as in the society. Individuals make friends, builds up relationship and lead a true social life through communicating effectively with the fellow beings.",opts:["True","False"],ans:0,exp:"Healthy self-expression and clear sharing are fundamental cornerstones of satisfying, functional individual and social lives."},
  {n:41,s:"L23",type:"tf",q:"Communication is needed to establish and disseminate the goals of a political organization.",opts:["True","False"],ans:0,exp:"Propagating foundational principles, manifestos, and platform directives is heavily communication-dependent."},
  {n:42,s:"L23",type:"tf",q:"Communication helps the organization in arriving at vital decisions.",opts:["True","False"],ans:0,exp:"Informed options and optimal pathways cannot be safely assessed without reliable information channels."},
  {n:43,s:"L23",type:"tf",q:"Communication helps a lot in planning and coordination.",opts:["True","False"],ans:0,exp:"Aligning separate schedules, resource lists, and workgroups requires flawless organizational feedback."},
  {n:44,s:"L23",type:"tf",q:"Communication it is a basic tool for motivation and an increase in the morale of the employees largely depend upon the effectiveness of communication.",opts:["True","False"],ans:0,exp:"Clear encouragement, transparency, and explicit rewards are the basic building blocks of labor motivation."},
  {n:45,s:"L23",type:"tf",q:"Communication helps a business as means of bringing about minimum production at the lowest level by maintaining good human relationship in the organization.",opts:["True","False"],ans:1,exp:"Correction: Effective collaboration drives toward maximum production and optimized output while cutting resource waste."},
  {n:46,s:"L23",type:"tf",q:"Communication works as an effective link between branches of the organization situated at great distances.",opts:["True","False"],ans:0,exp:"In our global era, modern remote operations survive entirely on telecommunications and network loops."},
  {n:47,s:"L23",type:"tf",q:"Communication helps in publicizing goods and services.",opts:["True","False"],ans:0,exp:"Marketing and branding are essentially communications designed to match product benefits with target audience needs."},
  {n:48,s:"L23",type:"tf",q:"Communication not reduces rumors and ensures smooth running of the organization as a whole.",opts:["True","False"],ans:1,exp:"Correction: Trustworthy and official communication channels successfully REDUCE hazardous workplace rumors."},
  {n:49,s:"L23",type:"tf",q:"Interpersonal skills refer to the disability to communicate or interact well with other people.",opts:["True","False"],ans:1,exp:"Correction: Interpersonal skills are defined as the precise ABILITY to converse and collaborate with colleagues fluidly."},
  {n:50,s:"L23",type:"tf",q:"In business lexicon, skills means the set of abilities enabling a person to interact positively and work effectively with others.",opts:["True","False"],ans:0,exp:"This is a direct, precise business definition of soft skills and personal resourcefulness."},
  {n:51,s:"L23",type:"tf",q:"Interpersonal communication skills are unnecessary prerequisites for enhancing productivity and continuity of the workforce within an organization.",opts:["True","False"],ans:1,exp:"Correction: Highly developed collaborative competence is an absolute NECESSITY for maintaining commercial productivity."},
  {n:52,s:"L23",type:"tf",q:"Employees with good interpersonal skills are likely to be more productive and permanent than those with poor interpersonal skills.",opts:["True","False"],ans:0,exp:"Socially competent workers solve friction constructively, reducing corporate turnover and boosting workflow metrics."},
  {n:53,s:"L23",type:"mc",q:"Communications refers to a set of techniques used for expressing ideas __________ and the technology of transmission of information by print or telecommunication media.",opts:["a. effectively","b. ineffectively"],ans:0,exp:"The science of communication focuses specifically on maximizing clarity to express thoughts effectively."},
  {n:54,s:"L23",type:"mc",q:"Communication is the act of conveying intended meaning from one entity or group to another through the use of __________.",opts:["a. mutually understood signs or semiotic rules","b. mutually understood signs"],ans:0,exp:"This contains the complete linguistic criteria, incorporating both base symbols (signs) and syntax guidelines (semiotics)."},
  {n:55,s:"L23",type:"mc",q:"Communication is a composite of information __________.",opts:["a. given and received","b. given only"],ans:0,exp:"A simple transmit without verification is only broadcasting; communication requires a reception component."},
  {n:56,s:"L23",type:"mc",q:"Communication is a composite of a listening effort by __________.",opts:["a. some","b. all involved"],ans:1,exp:"Total consensus cannot be built if key parties neglect listening responsibilities during negotiation cycles."},
  {n:57,s:"L23",type:"mc",q:"Communication is a composite a sympathetic fresh examination of issues by communicator __________.",opts:["a. himself","b. other"],ans:0,exp:"It demands internal self-evaluation from the communicator to align messaging with situational needs."},
  {n:58,s:"L23",type:"mc",q:"Communication is a composite a sensitive interaction of points of view leading to _________ level of shared understanding and _________ intention.",opts:["a. a higher / common","b. a lower / different"],ans:0,exp:"Dialogue aims to refine separate stances into a higher plane of understanding with a unified objective."},
  {n:59,s:"L23",type:"mc",q:"Communication is the intercourse by __________.",opts:["a. words, letters or messages","b. words, letters only"],ans:0,exp:"This definition includes direct spoken channels, physical/digital writing, and systemic signals/messages."},
  {n:60,s:"L23",type:"mc",q:"It is communication that binds people and society together. It is considered as a __________ process.",opts:["a. natural","b. unnatural"],ans:0,exp:"Linguistic structures and cooperative work are natural, instinctive outcomes of human development."},
  {n:61,s:"L23",type:"mc",q:"Society moves on:",opts:["a. Human interactions.","b. Exchange of ideas.","c. Thoughts, and feelings.","d. All the above."],ans:3,exp:"All these factors collectively sustain social dynamics and drive communities forward."},
  {n:62,s:"L23",type:"mc",q:"Progress and prosperity will come to a standstill if there is __________ communication.",opts:["a. effective","b. ineffective"],ans:1,exp:"Without clear communication channels, businesses, infrastructure, and societies fall into chaos."},
  {n:63,s:"L23",type:"mc",q:"Communication is a factor of building and maintaining __________ relations. It enables people to understand each other.",opts:["a. bad","b. good"],ans:1,exp:"The fundamental purpose of communication is to build and maintain constructive, cooperative relations."},
  {n:64,s:"L23",type:"mc",q:"Communication is as important and meaningful in individual life as in the society. Individuals make friends, builds up relationship and lead a __________ social life through communicating effectively with the fellow beings.",opts:["a. True","b. Bad"],ans:0,exp:"Effective communication allows individuals to build genuine relationships and live a true, healthy social life."},
  {n:65,s:"L23",type:"mc",q:"Communication is needed to establish and disseminate the goals of a __________ organization.",opts:["a. business","b. political"],ans:1,exp:"While applicable to both, this is a verbatim sentence matching the political systems analysis in Lecture 3."},
  {n:66,s:"L23",type:"mc",q:"Communication helps the organization in arriving at __________ decisions.",opts:["a. vital","b. inessential"],ans:0,exp:"Crucial, strategic decisions depend heavily on accurate information flowing from all levels of the firm."},
  {n:67,s:"L23",type:"mc",q:"Communication it is a basic tool for motivation and an __________ in the morale of the employees largely depend upon the effectiveness of communication.",opts:["a. increase","b. decrease"],ans:0,exp:"Clear, supportive communication increases employee morale, whereas silence or poor messaging reduces it."},
  {n:68,s:"L23",type:"mc",q:"Communication helps a business as means of bringing about __________ production at the lowest level by maintaining good human relationship in the organization.",opts:["a. minimum","b. maximum"],ans:1,exp:"High-functioning human relationships directly lead to maximum output at minimal administrative costs."},
  {n:69,s:"L23",type:"mc",q:"Communication works as an __________ link between branches of the organization situated at great distances.",opts:["a. effective","b. ineffective"],ans:0,exp:"It bridges physical distances, allowing multiple offices to operate as a single unified team."},
  {n:70,s:"L23",type:"mc",q:"Interpersonal skills refer to the (ability/disability) to communicate or interact well with other people. In business lexicon, it means the set of abilities enabling a person to interact (negatively/positively) and work effectively with others.",opts:["a. ability / positively","b. disability / negatively"],ans:0,exp:"These skills are the positive behavioral assets that enable collaborative team efforts."},
  {n:71,s:"L23",type:"mc",q:"Interpersonal communication skills are __________ prerequisites for enhancing productivity and continuity of the workforce within an organization.",opts:["a. necessary","b. unnecessary"],ans:0,exp:"Modern business requires high soft-skill capability to maintain stable, collaborative operations."},
  {n:72,s:"L23",type:"mc",q:"Employees with good interpersonal skills are likely to be __________ productive and permanent than those with poor interpersonal skills.",opts:["a. more","b. less"],ans:0,exp:"Better interpersonal relations reduce conflict-related delays and voluntary employee turnover."},

  // --- LECTURE 4 ---
  {n:73,s:"L4",type:"tf",q:"Verbal communication refers to the form of communication in which message is transmitted verbally; where communication is carried out either by word of mouth or by writing.",opts:["True","False"],ans:0,exp:"Verbal communication includes both oral (mouth) and written (letters/symbols) methods, as they both rely on words."},
  {n:74,s:"L4",type:"tf",q:"Nonverbal Communication refers to communications made through various wordless or unspoken mediums.",opts:["True","False"],ans:0,exp:"This includes body language, tone, eye contact, and physical expressions without spoken or written words."},
  {n:75,s:"L4",type:"tf",q:"Informal communications are those that are formal or 'official'. These are a part of the recognized communication system which is engaged in the operation of the organization.",opts:["True","False"],ans:1,exp:"Correction: The definition of 'official and systemic' communication refers strictly to FORMAL communication, not informal."},
  {n:76,s:"L4",type:"tf",q:"Formal grow out of social interactions among the people who work together within an organization. These are based upon conventions, customs and culture prevalent there in.",opts:["True","False"],ans:1,exp:"Correction: These are INFORMAL communications, also known as the organizational grapevine."},
  {n:77,s:"L4",type:"tf",q:"In a single-stranded chain, information is passed by one person to another, who in turn passes it to some other and the process continues.",opts:["True","False"],ans:0,exp:"This describes a sequential, linear chain of communication (A -> B -> C -> D)."},
  {n:78,s:"L4",type:"tf",q:"In a single-stranded chain, information is passed by one person to another, who in turn passes it to some other and the process continues. (Re-evaluation Question)",opts:["True","False"],ans:0,exp:"This is a duplicate test point re-confirming the basic linear sequence."},
  {n:79,s:"L4",type:"tf",q:"In a probability chain, information is passed by one person to his/her reliable ones, and the latter passes it to their reliable friends and the communication continues.",opts:["True","False"],ans:1,exp:"Correction: Passing information selectively to reliable or trusted individuals is the definition of a CLUSTER chain."},
  {n:80,s:"L4",type:"tf",q:"In a cluster chain, a person passes the information to a randomly chosen person and the communication goes on.",opts:["True","False"],ans:1,exp:"Correction: Passing information randomly is the definition of a PROBABILITY chain."},
  {n:81,s:"L4",type:"tf",q:"In a gossip chain, a person passes the information to a group of people and the members of the group passes it to some more people and the information spreads.",opts:["True","False"],ans:0,exp:"In this curriculum, this describes a gossip chain structure, where information spreads outward to multiple groups."},
  {n:82,s:"L4",type:"tf",q:"Downward communication can be both oral and written.",opts:["True","False"],ans:0,exp:"Superiors can instruct subordinates through oral instructions (meetings) or written formats (memos, emails)."},
  {n:83,s:"L4",type:"tf",q:"Higher authority of organization takes the initiative to start such communication. (Referring to Downward Communication)",opts:["True","False"],ans:0,exp:"Downward communication is initiated by managers and leaders to guide their subordinates."},
  {n:84,s:"L4",type:"tf",q:"Lower authority of organization takes the initiative to start such communication. (Referring to Downward Communication)",opts:["True","False"],ans:1,exp:"Correction: Downward communication is initiated by the higher authorities, not lower authorities."},
  {n:85,s:"L4",type:"tf",q:"Upward communication flows from subordinates to superiors and continues up the organizational hierarchy.",opts:["True","False"],ans:0,exp:"This allows feedback, reports, and suggestions to flow up the corporate ladder to decision-makers."},
  {n:86,s:"L4",type:"tf",q:"Downward communication flows from subordinates to superiors and continues up the organizational hierarchy.",opts:["True","False"],ans:1,exp:"Correction: Upward communication flows up the hierarchy; downward communication flows down to subordinates."},
  {n:87,s:"L4",type:"tf",q:"Upward communication is also called consultative management.",opts:["True","False"],ans:0,exp:"Consultative management values feedback and insights from subordinates, which requires active upward communication."},
  {n:88,s:"L4",type:"mc",q:"__________ communication refers to the form of communication in which message is transmitted verbally; where communication is carried out either by word of mouth or by writing.",opts:["a. Verbal","b. Nonverbal"],ans:0,exp:"Since both spoken words and written text use words, they are both forms of verbal communication."},
  {n:89,s:"L4",type:"mc",q:"__________ Communication refers to communications made through various wordless or unspoken mediums.",opts:["a. Verbal","b. Nonverbal"],ans:1,exp:"Nonverbal communication is characterized by the absence of spoken or written words."},
  {n:90,s:"L4",type:"mc",q:"Nonverbal Communication refers to communications made through various __________ or __________ mediums.",opts:["a. wordless / unspoken","b. word / spoken"],ans:0,exp:"These two descriptors outline nonverbal messages, such as gestures, expressions, and posture."},
  {n:91,s:"L4",type:"mc",q:"__________ communications are those that are formal or 'official'. These are a part of the recognized communication system which is engaged in the operation of the organization.",opts:["a. Informal","b. Formal"],ans:1,exp:"Official policies and reporting channels follow the formal structural guidelines of the firm."},
  {n:92,s:"L4",type:"mc",q:"__________ grow out of social interactions among the people who work together within an organization. These are based upon conventions, customs and culture prevalent there in.",opts:["a. Informal","b. Formal"],ans:0,exp:"Informal pathways develop naturally as coworkers socialize outside of formal structures."},
  {n:93,s:"L4",type:"mc",q:"Informal communications grow __________ of social interactions among the people who work together within an organization.",opts:["a. in","b. out"],ans:1,exp:"They grow 'out' of social relationships that form within the work environment."},
  {n:94,s:"L4",type:"mc",q:"__________ communication is also called consultative management.",opts:["a. Downward","b. upward"],ans:1,exp:"Because it relies on feedback and suggestions from subordinates, upward communication is the basis of consultative management."},
  {n:95,s:"L4",type:"mc",q:"In __________ chain, information is passed by one person to another, who in turn passes it to some other and the process continues.",opts:["a. A single-stranded","b. probability"],ans:0,exp:"This describes a single-threaded linear sequence from one person to the next."},
  {n:96,s:"L4",type:"mc",q:"In a __________ chain, information is passed by one person to his/her reliable ones, and the latter passes it to their reliable friends and the communication continues.",opts:["a. probability","b. cluster"],ans:1,exp:"A cluster chain is built on selective sharing with trusted individuals who then do the same."},
  {n:97,s:"L4",type:"mc",q:"In a __________ chain, a person passes the information to a randomly chosen person and the communication goes on.",opts:["a. gossip","b. probability"],ans:1,exp:"Probability chains are based on sharing information with randomly chosen individuals."},
  {n:98,s:"L4",type:"mc",q:"In a __________ chain, a person passes the information to a group of people and the members of the group passes it to some more people and the information spreads.",opts:["a. gossip","b. cluster"],ans:0,exp:"Gossip chains spread information broadly across social groups."},
  {n:99,s:"L4",type:"mc",q:"Downward communication can be __________.",opts:["a. Both oral and written","b. oral only"],ans:0,exp:"Managers use both written instructions (manuals, policies) and verbal guidance (meetings)."},
  {n:100,s:"L4",type:"mc",q:"__________ of organization takes the initiative to start such communication. (Referring to Downward Communication)",opts:["a. lower authority","b. Higher authority"],ans:1,exp:"Superiors hold the operational responsibility to initiate downward communication directions."},
  {n:101,s:"L4",type:"mc",q:"__________ communication flows from subordinates to superiors and continues up the organizational hierarchy.",opts:["a. Downward","b. upward"],ans:1,exp:"This describes upward flow, conveying reports, results, and concerns to management."},
  {n:102,s:"L4",type:"mc",q:"__________ communication is non-directive in nature.",opts:["a. Downward","b. Upward"],ans:1,exp:"Downward communication is directive (orders), while upward communication is non-directive (feedback/reports)."},
  {n:103,s:"L4",type:"mc",q:"__________ communication is also called consultative management. (Re-evaluation Question)",opts:["a. Downward","b. upward"],ans:1,exp:"This re-confirms that consultative systems depend heavily on upward communication channels."},
  {n:104,s:"L4",type:"sa",q:"What are the different types of Communication?",ans:"According to organizational structure and styles, communication is classified into: 1. Verbal and Non-Verbal Communication (by medium). 2. Formal and Informal Communication (by organizational channels). 3. Downward and Upward Communication (by direction of flow along the organizational hierarchy).",exp:"Be prepared to outline all three classifications: by medium, channel, and direction of flow."},
  {n:105,s:"L4",type:"sa",q:"The different components of verbal communication:",ans:"The key components include: 1. Oral/Spoken elements: Word of mouth, vocabulary choice, understandable language, inflection (stress in oral speech), tone, and auditory elements. 2. Written elements: Text, letters, printed manuals, signs, visuals (pictures, maps, charts, graphs, colors, signs), and eye behaviors (oculesics) that run parallel to verbal statements.",exp:"Note that visuals and oculesics are included under verbal components in this curriculum when they directly support or accompany verbal statements."},

  // --- LECTURE 5: PROCESS ELEMENTS ---
  {n:106,s:"L5",type:"tf",q:"The process of communication as such must be a continuous and dynamic interaction, both affecting and being affected by many variables.",opts:["True","False"],ans:0,exp:"Lecture 5, Slide 3: Communication process is dynamic and continuous, consistently interacting with and being modified by external and internal variables."},
  {n:107,s:"L5",type:"tf",q:"Process of Communication Elements include seven elements.",opts:["True","False"],ans:0,exp:"Lecture 5, Slide 4 lists exactly 7 structural elements: Sender, Message, Encoding, Channel, Receiver, Decoding, and Feedback."},
  {n:108,s:"L5",type:"tf",q:"Process of Communication Elements include ten elements.",opts:["True","False"],ans:1,exp:"Lecture 5, Slide 4 lists exactly seven core elements, not ten."},
  {n:109,s:"L5",type:"tf",q:"The very foundation of communication process is laid by the person who transmits or sends the message.",opts:["True","False"],ans:0,exp:"Lecture 5, Slide 5: The sender initiates the thought, meaning, or feedback cycle, laying down the foundational element."},
  {n:110,s:"L5",type:"tf",q:"Message is the heart of communication. It is the content the sender wants to covey to the receiver.",opts:["True","False"],ans:0,exp:"Lecture 5, Slide 6: The message is the core, vital contents/ideas/feelings the sender aims to share with the recipient."},
  {n:111,s:"L5",type:"tf",q:"Message it can be verbal both written and spoken; or non-verbal i.e. pictorial or symbolic, etc.",opts:["True","False"],ans:0,exp:"Lecture 5, Slide 6: Messages take many forms, utilizing words, text, gestures, or visual symbols depending on situational contexts."},
  {n:112,s:"L5",type:"tf",q:"Message it can be verbal only.",opts:["True","False"],ans:1,exp:"Correction: Messages can also be non-verbal (pictorial, gestures, expressions, symbols)."},
  {n:113,s:"L5",type:"tf",q:"Message It can be non-verbal only i.e. pictorial or symbolic, etc.",opts:["True","False"],ans:1,exp:"Correction: Messages are commonly verbal (spoken or written) alongside non-verbal cues."},
  {n:114,s:"L5",type:"tf",q:"Encoding is putting the targeted message into appropriate medium which may be verbal or non-verbal depending upon the situation, time, space and nature of the message to be sent.",opts:["True","False"],ans:0,exp:"Lecture 5, Slide 7: Encoding translates abstract ideas into structured words, symbols, or signals suitable for transmission."},
  {n:115,s:"L5",type:"tf",q:"Message is putting the targeted message into appropriate medium which may be verbal or non-verbal depending upon the situation, time, space and nature of the message to be sent.",opts:["True","False"],ans:1,exp:"Correction: This is the definition of 'Encoding', not 'Message'."},
  {n:116,s:"L5",type:"tf",q:"Encoding is putting the targeted message into appropriate medium which may be verbal only depending upon the situation, time, space and nature of the message to be sent.",opts:["True","False"],ans:1,exp:"Correction: Encoding is not limited to verbal mediums only; it can utilize non-verbal symbols, pictures, and codes."},
  {n:117,s:"L5",type:"tf",q:"Encoding is an important step in the communication process.",opts:["True","False"],ans:0,exp:"Lecture 5, Slide 7: Incorrect encoding or poor translation of the idea can completely defeat the true objective of the transmission."},
  {n:118,s:"L5",type:"tf",q:"Channel(s) refers to the way or mode the message flows or is transmitted through.",opts:["True","False"],ans:0,exp:"Lecture 5, Slide 8: The channel acts as the medium or pathway carrying the signal between sender and receiver."},
  {n:119,s:"L5",type:"tf",q:"Encoding (s) refers to the way or mode the message flows or is transmitted through.",opts:["True","False"],ans:1,exp:"Correction: This is the definition of 'Channel', not 'Encoding'."},
  {n:120,s:"L5",type:"tf",q:"The message may be oral or written and it may be transmitted through a memorandum, a computer, telephone, cell phone, apps or televisions.",opts:["True","False"],ans:0,exp:"Lecture 5, Slide 8: Multiple technical and written platforms act as the structural delivery channels for a message."},
  {n:121,s:"L5",type:"tf",q:"The message may be written only and it may be transmitted through a memorandum, a computer, telephone, cell phone, apps or televisions.",opts:["True","False"],ans:1,exp:"Correction: Messages can also be oral/spoken, transmitted via telephone, computer, or in-person talk."},
  {n:122,s:"L5",type:"tf",q:"Each channel has its advantages and disadvantages.",opts:["True","False"],ans:0,exp:"Lecture 5, Slide 9: Choosing the proper channel depends on matching its distinct advantages/drawbacks with the immediate message requirements."},
  {n:123,s:"L5",type:"tf",q:"Each channel has its disadvantages only.",opts:["True","False"],ans:1,exp:"Correction: Every channel has unique strategic advantages (e.g., speed of call, permanence of a memo)."},
  {n:124,s:"L5",type:"tf",q:"Each channel has its advantages only.",opts:["True","False"],ans:1,exp:"Correction: Every channel carries limitations or cost drawbacks (e.g., lack of body language in text, potential noise on lines)."},
  {n:125,s:"L5",type:"tf",q:"Receiver is the person or group who the message is meant for.",opts:["True","False"],ans:0,exp:"Lecture 5, Slide 10: The receiver represents the targeted audience at the other end of the communication pathway."},
  {n:126,s:"L5",type:"tf",q:"The extent to which the receiver decodes the message depends on his/her knowledge of the subject matter of the message, experience, trust and relationship with the sender.",opts:["True","False"],ans:0,exp:"Lecture 5, Slide 10: A recipient's interpretive capability is shaped deeply by contextual familiarity, trust, and shared history."},
  {n:127,s:"L5",type:"tf",q:"The receiver is as significant a factor in communication process as the sender is. It is the other end of the process.",opts:["True","False"],ans:0,exp:"Lecture 5, Slide 11: Without active reception and proper interpretation at the other end, communication falls flat."},
  {n:128,s:"L5",type:"tf",q:"Decoding refers to interpreting or converting the sent message into intelligible language.",opts:["True","False"],ans:0,exp:"Lecture 5, Slide 12: Decoding translates the received symbols/medium back into conceptual understanding."},
  {n:129,s:"L5",type:"tf",q:"Encoding refers to interpreting or converting the sent message into intelligible language.",opts:["True","False"],ans:1,exp:"Correction: This is the definition of 'Decoding', not 'Encoding'."},
  {n:130,s:"L5",type:"tf",q:"Feedback is the ultimate aspect of communication process. It refers to the response of the receiver as to the message sent to him/her by the sender.",opts:["True","False"],ans:0,exp:"Lecture 5, Slide 13: Feedback closes the loop, showing the sender how effectively the information was parsed."},
  {n:131,s:"L5",type:"tf",q:"Feedback is necessary to ensure that the message has been effectively encoded, sent, decoded and comprehended.",opts:["True","False"],ans:0,exp:"Lecture 5, Slide 13: Only feedback confirms if actual communication occurred instead of mere broadcasting."},
  {n:132,s:"L5",type:"tf",q:"Feedback is unnecessary to ensure that the message has been effectively encoded, sent, decoded and comprehended.",opts:["True","False"],ans:1,exp:"Correction: Feedback is absolutely essential to verify mutual understanding and task alignment."},
  {n:133,s:"L5",type:"tf",q:"It is the final step of the communication process and establishes that the receiver has received the message in its letter and spirit.",opts:["True","False"],ans:0,exp:"Lecture 5, Slide 14: Accurate feedback verifies that the recipient's parsed interpretation matches the sender's original intent."},
  {n:134,s:"L5",type:"tf",q:"It is the first step of the communication process and establishes that the receiver has received the message in its letter and spirit.",opts:["True","False"],ans:1,exp:"Correction: Feedback is the final cyclical step. The first step is the sender choosing/forming the message."},
  {n:135,s:"L5",type:"tf",q:"Negative Feedback or corrective comments about past behavior.",opts:["True","False"],ans:0,exp:"Lecture 5, Slide 15: This describes negative feedback, focusing on past actions to adjust course."},
  {n:136,s:"L5",type:"tf",q:"Positive Feedback or affirming comments about future behavior.",opts:["True","False"],ans:1,exp:"Correction: Feedback is about past behavior. Affirming comments about future behavior describes 'Positive Feedforward'."},
  {n:137,s:"L5",type:"tf",q:"Negative feedforward or corrective comments about future behavior.",opts:["True","False"],ans:0,exp:"Lecture 5, Slide 15: Corrective guidelines focused on future behavior describe negative feedforward."},
  {n:138,s:"L5",type:"tf",q:"Positive feedforward or affirming comments about future behavior.",opts:["True","False"],ans:0,exp:"Lecture 5, Slide 15: Encouraging/affirming statements directed toward upcoming tasks/behavior describe positive feedforward."},
  {n:139,s:"L5",type:"tf",q:"Positive Feedback or corrective comments about past behavior.",opts:["True","False"],ans:1,exp:"Correction: Corrective comments about past behavior are 'Negative Feedback', not positive."},
  {n:140,s:"L5",type:"tf",q:"Negative Feedback or affirming comments about future behavior.",opts:["True","False"],ans:1,exp:"Correction: Affirming comments about future behavior are 'Positive Feedforward', not negative feedback."},
  {n:141,s:"L5",type:"tf",q:"Positive feedforward or corrective comments about future behavior.",opts:["True","False"],ans:1,exp:"Correction: Corrective comments about future behavior are 'Negative Feedforward', not positive."},
  {n:142,s:"L5",type:"tf",q:"Negative feedforward or affirming comments about future behavior.",opts:["True","False"],ans:1,exp:"Correction: Affirming comments about future behavior are 'Positive Feedforward', not negative."},

  // --- LECTURE 5: MULTIPLE CHOICE ---
  {n:143,s:"L5",type:"mc",q:"Process of Communication Elements include __________ elements.",opts:["a. 7","b. 9"],ans:0,exp:"Lecture 5, Slide 4: The standard model contains exactly 7 components: Sender, Message, Encoding, Channel, Receiver, Decoding, Feedback."},
  {n:144,s:"L5",type:"mc",q:"Message It can be __________.",opts:["a. verbal & non-verbal","b. non-verbal only"],ans:0,exp:"Lecture 5, Slide 6: It comprises spoken/written words (verbal) and signs/pictures/symbols (non-verbal)."},
  {n:145,s:"L5",type:"mc",q:"__________ is the heart of communication. It is the content the sender wants to covey to the receiver.",opts:["a. Encoding","b. Message"],ans:1,exp:"Lecture 5, Slide 6: The message represents the actual core thoughts/ideas that have been formatted for exchange."},
  {n:146,s:"L5",type:"mc",q:"__________ is putting the targeted message into appropriate medium which may be verbal or non-verbal depending upon the situation, time, space and nature of the message to be sent.",opts:["a. Message","b. Encoding"],ans:1,exp:"Lecture 5, Slide 7: Encoding is the mechanical process of packaging the thoughts into transmissible codes/symbols."},
  {n:147,s:"L5",type:"mc",q:"Encoding is putting the targeted message into appropriate medium which may be __________ depending upon the situation, time, space and nature of the message to be sent.",opts:["a. verbal or non-verbal","b. verbal only"],ans:0,exp:"Lecture 5, Slide 7: Medium choices can span verbal and non-verbal arrays, adapted dynamically to the recipient and environment."},
  {n:148,s:"L5",type:"mc",q:"Encoding is an __________ step in the communication process.",opts:["a. unimportant","b. important"],ans:1,exp:"Lecture 5, Slide 7: Poorly targeted symbols or syntax will result in complete receiver incomprehension."},
  {n:149,s:"L5",type:"mc",q:"__________ (s) refers to the way or mode the message flows or is transmitted through.",opts:["a. Channel","b. Encoding"],ans:0,exp:"Lecture 5, Slide 8: The physical carrier or path through which formatted signals travel is the channel."},
  {n:150,s:"L5",type:"mc",q:"The message may be __________ and it may be transmitted through a memorandum, a computer, telephone, cell phone, apps or televisions.",opts:["a. oral or written","b. written only"],ans:0,exp:"Lecture 5, Slide 8: Transmission can be achieved via spoken (oral) or documented (written) formats."},
  {n:151,s:"L5",type:"mc",q:"Each channel has its __________.",opts:["a. advantages only","b. advantages and disadvantages"],ans:1,exp:"Lecture 5, Slide 9: Selectors must weigh the trade-offs (such as speed vs. official records) of each channel."},
  {n:152,s:"L5",type:"mc",q:"The extent to which the receiver decodes the message depends on his/her __________.",opts:["A. Knowledge of the subject matter","B. Experience and trust with sender","C. Both A and B","D. None of the above"],ans:2,exp:"Lecture 5, Slide 10: Prior knowledge, experience, trust levels, and sender relationship dictate interpretative accuracy."},
  {n:153,s:"L5",type:"mc",q:"The __________ is as significant a factor in communication process as the sender is. It is the other end of the process.",opts:["a. message","b. receiver"],ans:1,exp:"Lecture 5, Slide 11: The recipient must be receptive and attentive to close the loop successfully."},
  {n:154,s:"L5",type:"mc",q:"__________ refers to interpreting or converting the sent message into intelligible language.",opts:["a. Decoding","b. Encoding"],ans:0,exp:"Lecture 5, Slide 12: Translating incoming signals back into clean thoughts is decoding."},
  {n:155,s:"L5",type:"mc",q:"Feedback is __________ to ensure that the message has been effectively encoded, sent, decoded and comprehended.",opts:["a. unnecessary","b. necessary"],ans:1,exp:"Lecture 5, Slide 13: Verification steps are necessary to validate if actual communication occurred."},
  {n:156,s:"L5",type:"mc",q:"It is the __________ step of the communication process and establishes that the receiver has received the message in its letter and spirit.",opts:["a. final","b. initial"],ans:0,exp:"Lecture 5, Slide 14: Feedback is the final systemic checkpoint wrapping the cyclic loop."},
  {n:157,s:"L5",type:"mc",q:"__________ Feedback or corrective comments about past behavior.",opts:["a. Negative","b. Positive"],ans:0,exp:"Lecture 5, Slide 15: Corrective commentary analyzing past performance represents Negative Feedback."},
  {n:158,s:"L5",type:"mc",q:"__________ Feedback or affirming comments about past behavior.",opts:["a. Negative","b. Positive"],ans:1,exp:"Lecture 5, Slide 15: Affirmative or supportive commentary analyzing past actions is Positive Feedback."},
  {n:159,s:"L5",type:"mc",q:"__________ or corrective comments about future behavior.",opts:["a. Negative feedforward","b. Positive feedforward"],ans:0,exp:"Lecture 5, Slide 15: Forward-looking guidance highlighting adjustments to future tasks is Negative Feedforward."},
  {n:160,s:"L5",type:"mc",q:"__________ or affirming comments about future behavior.",opts:["a. Negative feedforward","b. Positive feedforward"],ans:1,exp:"Lecture 5, Slide 15: Encouragement and optimistic guidance focused on upcoming actions represent Positive Feedforward."},
  {n:161,s:"L5",type:"mc",q:"The process of communication is cyclic because it begins and ends with the __________.",opts:["a. sender","b. receiver"],ans:0,exp:"Lecture 5, Slide 2: It is a cyclic loop starting from the sender and returning to the sender via recipient feedback."},

  // --- LECTURE 6: MODELS ---
  {n:162,s:"L6",type:"tf",q:"A model of Effective communication is a thing used to follow or imitate Communication.",opts:["True","False"],ans:0,exp:"Lecture 6, Slide 2: Communication models represent structural guides to help emulate or optimize communications within organizations."},

const LABELS = ["A", "B", "C", "D"];
const SECTION_LABELS = { 
  L1: "Lecture 1", 
  L23: "Lecture 2 & 3", 
  L4: "Lecture 4", 
  L5: "Lecture 5", 
  L6: "Lecture 6", 
  L7: "Lecture 7", 
  L89: "Lectures 8 & 9" 
};
const PER_PAGE = 10;

let currentQuestions = [];
let userAnswers = {}; // qNum -> chosenIndex
let saAnswers = {};    // qNum -> inputString
let saChecked = {};    // qNum -> boolean
let currentPage = 0;
let activeFilter = "all";

function filterQuestions() {
  if (activeFilter === "all") {
    currentQuestions = [...QUESTIONS_DATABASE];
  } else {
    currentQuestions = QUESTIONS_DATABASE.filter(q => q.s === activeFilter);
  }
}

function getTotalPages() {
  return Math.ceil(currentQuestions.length / PER_PAGE);
}

function getPageQuestions() {
  const start = currentPage * PER_PAGE;
  return currentQuestions.slice(start, start + PER_PAGE);
}

function countScore() {
  let answered = 0;
  let correct = 0;
  let wrong = 0;

  currentQuestions.forEach(q => {
    if (q.type === 'sa') {
      if (saChecked[q.n]) {
        answered++;
        const input = (saAnswers[q.n] || '').toLowerCase().trim();
        let isCorrect = false;
        if (q.n === 24) {
          isCorrect = input.includes('communis') && input.includes('sender') && input.includes('receiver');
        } else if (q.n === 104) {
          isCorrect = input.includes('verbal') && input.includes('formal') && input.includes('downward');
        } else if (q.n === 105) {
          isCorrect = input.includes('oral') || input.includes('written') || input.includes('language');
        } else {
          isCorrect = input.length > 15;
        }
        if (isCorrect) correct++; else wrong++;
      }
    } else {
      const selected = userAnswers[q.n];
      if (selected !== undefined) {
        answered++;
        if (selected === q.ans) {
          correct++;
        } else {
          wrong++;
        }
      }
    }
  });

  return { total: currentQuestions.length, answered, correct, wrong };
}

function updateCounters() {
  const stats = countScore();
  document.getElementById("st-total").textContent = stats.total;
  document.getElementById("st-answered").textContent = stats.answered;
  document.getElementById("st-correct").textContent = stats.correct;
  document.getElementById("st-wrong").textContent = stats.wrong;

  const progressPct = stats.total > 0 ? Math.round((stats.answered / stats.total) * 100) : 0;
  document.getElementById("prog-fill").style.width = progressPct + "%";
  document.getElementById("prog-label").textContent = stats.answered + " / " + stats.total + " answered (" + progressPct + "% completed)";
}

function selectOption(qNum, selectedIndex) {
  if (userAnswers[qNum] !== undefined) return;
  userAnswers[qNum] = selectedIndex;
  renderPage();
}

function verifyShortAnswer(qNum) {
  saChecked[qNum] = true;
  renderPage();
}

function renderPage() {
  const container = document.getElementById("q-container");
  container.innerHTML = "";

  const pageQuestions = getPageQuestions();
  pageQuestions.forEach(q => {
    const card = document.createElement("div");
    card.className = "q-card";

    const isAnswered = q.type !== 'sa' ? (userAnswers[q.n] !== undefined) : (saChecked[q.n] === true);
    let correctClass = "";
    if (isAnswered) {
      if (q.type !== 'sa') {
        correctClass = userAnswers[q.n] === q.ans ? " correct-card" : " wrong-card";
      } else {
        correctClass = " correct-card"; // Short answers highlight in green on submission
      }
      card.className += correctClass;
    }

    // Header Meta
    const headerHTML = `
      <div class="q-header">
        <span class="q-num">Q${q.n}</span>
        <span class="q-badge">${SECTION_LABELS[q.s]}</span>
      </div>
    `;

    // Question Text
    const textHTML = `<div class="q-text">${q.q}</div>`;

    // Input Mechanics
    let inputHTML = "";
    if (q.type !== 'sa') {
      const optionsHTML = q.opts.map((opt, optIndex) => {
        let optCls = "opt";
        if (isAnswered) {
          if (optIndex === q.ans) {
            optCls += " opt-correct";
          } else if (optIndex === userAnswers[q.n]) {
            optCls += " opt-wrong";
          }
        }
        const disabled = isAnswered ? "disabled" : "";
        return `
          <button class="${optCls}" ${disabled} onclick="selectOption(${q.n}, ${optIndex})">
            <span class="opt-label">${LABELS[optIndex]}</span>
            <span>${opt}</span>
          </button>
        `;
      }).join("");
      inputHTML = `<div class="options">${optionsHTML}</div>`;
    } else {
      const currentInputVal = saAnswers[q.n] || "";
      const disabledAttr = isAnswered ? "disabled" : "";
      
      let saControlHTML = "";
      if (!isAnswered) {
        saControlHTML = `
          <div style="display:flex; justify-content:flex-end;">
            <button class="btn-primary" style="font-size:11px; padding:6px 12px;" onclick="verifyShortAnswer(${q.n})">Verify Answer</button>
          </div>
        `;
      } else {
        saControlHTML = `
          <div class="feedback fb-correct">
            <span class="feedback-title">✓ Checked — Compare your answer with standard definitions below:</span>
            <div style="color:var(--text); font-style:italic; font-weight:600; margin-top:4px;">"${q.ans}"</div>
          </div>
        `;
      }

      inputHTML = `
        <div style="width:100%;">
          <textarea class="sa-input" id="sa-textarea-${q.n}" rows="2" ${disabledAttr} placeholder="Type your lecture response here..." oninput="saAnswers[${q.n}] = this.value">${currentInputVal}</textarea>
          ${saControlHTML}
        </div>
      `;
    }

    // Explanation / Feedback Context
    let feedbackHTML = "";
    if (isAnswered) {
      if (q.type !== 'sa') {
        const isUserCorrect = userAnswers[q.n] === q.ans;
        feedbackHTML = `
          <div class="feedback ${isUserCorrect ? 'fb-correct' : 'fb-wrong'}">
            <span class="feedback-title">${isUserCorrect ? '✓ Correct Answer' : '✗ Incorrect Answer'}</span>
            <div>Verified Choice: <strong>${q.opts[q.ans]}</strong></div>
            ${q.exp ? `<div style="font-size:11px; color:var(--muted); margin-top:6px; border-top:1px solid rgba(255,255,255,0.05); padding-top:6px;"><strong>Context:</strong> ${q.exp}</div>` : ""}
          </div>
        `;
      } else {
        // Standard context info for short answers
        feedbackHTML = `
          <div class="feedback fb-correct" style="font-size:11px; color:var(--muted);">
            <strong>Lecture Context:</strong> ${q.exp}
          </div>
        `;
      }
    }

    card.innerHTML = headerHTML + textHTML + inputHTML + feedbackHTML;
    container.appendChild(card);
  });

  const totalPages = getTotalPages();
  document.getElementById("page-info").textContent = "Page " + (currentPage + 1) + " / " + (totalPages || 1);
  updateCounters();
}

function prevPage() {
  if (currentPage > 0) {
    currentPage--;
    renderPage();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function nextPage() {
  if (currentPage < getTotalPages() - 1) {
    currentPage++;
    renderPage();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function filterSection() {
  activeFilter = document.getElementById("section-sel").value;
  currentPage = 0;
  filterQuestions();
  renderPage();
}

function resetQuiz() {
  userAnswers = {};
  saAnswers = {};
  saChecked = {};
  currentPage = 0;
  renderPage();
}

// Initial Run
filterQuestions();
renderPage();
</script>
</body>
</html>
