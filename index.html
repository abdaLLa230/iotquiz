<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IoT Quiz – 300 MCQs</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3352;
    --accent: #4f8ef7;
    --accent2: #7c5cfc;
    --green: #22c55e;
    --red: #ef4444;
    --text: #e8eaf6;
    --muted: #8b90b8;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .header-right { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

  select, button {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  select:hover, button:hover { border-color: var(--accent); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
  .btn-primary:hover { background: #3a7de8; }
  .btn-danger { background: #2d1a1a; color: var(--red); border-color: var(--red); }

  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    padding: 20px 24px 0;
    max-width: 860px;
    margin: 0 auto;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    text-align: center;
  }
  .stat-val { font-size: 28px; font-weight: 700; }
  .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
  .val-green { color: var(--green); }
  .val-red { color: var(--red); }
  .val-accent { color: var(--accent); }

  .progress-wrap { padding: 16px 24px 0; max-width: 860px; margin: 0 auto; }
  .progress-track { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent)); border-radius: 3px; transition: width 0.4s ease; }
  .progress-label { font-size: 12px; color: var(--muted); margin-top: 6px; text-align: right; }

  main { max-width: 860px; margin: 0 auto; padding: 20px 24px 40px; }

  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 14px;
    transition: border-color 0.2s;
  }
  .q-card.correct-card { border-color: var(--green); }
  .q-card.wrong-card { border-color: var(--red); }

  .q-header { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
  .q-num { font-size: 12px; color: var(--muted); font-weight: 600; }
  .q-badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 20px;
    background: var(--surface2);
    color: var(--accent);
    border: 1px solid var(--border);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .q-text { font-size: 15px; font-weight: 500; line-height: 1.5; margin-bottom: 14px; }

  .options { display: grid; gap: 8px; }
  .opt {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    font-size: 13px;
    line-height: 1.4;
    text-align: left;
    color: var(--text);
    transition: border-color 0.15s, background 0.15s;
    width: 100%;
  }
  .opt:not(:disabled):hover { border-color: var(--accent); background: #1e2440; }
  .opt:disabled { cursor: default; }
  .opt.opt-correct { border-color: var(--green); background: #0d2818; color: #86efac; }
  .opt.opt-wrong { border-color: var(--red); background: #2d1010; color: #fca5a5; }
  .opt.opt-reveal { border-color: var(--green); background: #0d2818; color: #86efac; }
  .opt-label {
    min-width: 24px;
    height: 24px;
    border-radius: 6px;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .opt-correct .opt-label { background: var(--green); color: #fff; }
  .opt-wrong .opt-label { background: var(--red); color: #fff; }
  .opt-reveal .opt-label { background: var(--green); color: #fff; }

  .feedback { font-size: 12px; margin-top: 8px; padding: 8px 12px; border-radius: 8px; background: var(--surface2); }
  .feedback.fb-correct { color: var(--green); }
  .feedback.fb-wrong { color: var(--red); }

  .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; flex-wrap: wrap; gap: 10px; }
  .page-info { font-size: 13px; color: var(--muted); }

  /* Results */
  #results {
    display: none;
    max-width: 560px;
    margin: 40px auto;
    padding: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    text-align: center;
  }
  .score-ring {
    width: 140px;
    height: 140px;
    margin: 0 auto 20px;
    position: relative;
  }
  .score-ring svg { transform: rotate(-90deg); }
  .score-inner {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .score-pct { font-size: 32px; font-weight: 800; color: var(--accent); }
  .score-sub { font-size: 12px; color: var(--muted); }
  .grade-label { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .grade-msg { font-size: 14px; color: var(--muted); margin-bottom: 20px; }
  .result-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin: 16px 0 24px; }
  .result-cell { background: var(--surface2); border-radius: 10px; padding: 12px; }
  .result-cell .val { font-size: 24px; font-weight: 700; }
  .result-cell .lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .results-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

  @media(max-width:600px){
    .stats-bar { grid-template-columns: repeat(2,1fr); }
    .stat-val { font-size: 22px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">IoT <span>Quiz</span> &nbsp;<span style="font-size:13px;color:var(--muted);font-weight:400">300 MCQs</span></div>
  <div class="header-right">
    <select id="section-sel" onchange="filterSection()">
      <option value="all">All sections</option>
      <option value="A">A – General IoT (1–80)</option>
      <option value="B">B – MQTT (81–150)</option>
      <option value="C">C – OSPF & BGP (151–210)</option>
      <option value="D">D – LoRa & LoRaWAN (211–260)</option>
      <option value="E">E – ESP32 (261–300)</option>
    </select>
    <button class="btn-primary" onclick="resetQuiz()">&#8635; Reset</button>
  </div>
</header>

<div class="stats-bar">
  <div class="stat-card"><div class="stat-val val-accent" id="st-total">300</div><div class="stat-lbl">Total</div></div>
  <div class="stat-card"><div class="stat-val" id="st-answered">0</div><div class="stat-lbl">Answered</div></div>
  <div class="stat-card"><div class="stat-val val-green" id="st-correct">0</div><div class="stat-lbl">Correct</div></div>
  <div class="stat-card"><div class="stat-val val-red" id="st-wrong">0</div><div class="stat-lbl">Wrong</div></div>
</div>

<div class="progress-wrap">
  <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="progress-label" id="prog-label">0 / 300 answered</div>
</div>

<main id="quiz-main">
  <div id="q-container"></div>
  <div class="nav-bar">
    <button onclick="prevPage()">&#8592; Previous</button>
    <span class="page-info" id="page-info">Page 1 / 30</span>
    <button onclick="nextPage()">Next &#8594;</button>
  </div>
  <div style="text-align:center;margin-top:16px">
    <button class="btn-primary" id="finish-btn" style="display:none;padding:10px 28px;font-size:15px" onclick="showResults()">See Results &#8594;</button>
  </div>
</main>

<div id="results">
  <div class="score-ring">
    <svg width="140" height="140" viewBox="0 0 140 140">
      <circle cx="70" cy="70" r="60" fill="none" stroke="#22263a" stroke-width="12"/>
      <circle id="ring-arc" cx="70" cy="70" r="60" fill="none" stroke="#4f8ef7" stroke-width="12" stroke-dasharray="377" stroke-dashoffset="377" stroke-linecap="round"/>
    </svg>
    <div class="score-inner">
      <div class="score-pct" id="res-pct">0%</div>
      <div class="score-sub" id="res-frac">0/0</div>
    </div>
  </div>
  <div class="grade-label" id="res-grade"></div>
  <div class="grade-msg" id="res-msg"></div>
  <div class="result-grid">
    <div class="result-cell"><div class="val val-green" id="res-correct">0</div><div class="lbl">Correct</div></div>
    <div class="result-cell"><div class="val val-red" id="res-wrong">0</div><div class="lbl">Wrong</div></div>
    <div class="result-cell"><div class="val" id="res-skip">0</div><div class="lbl">Skipped</div></div>
  </div>
  <div class="results-btns">
    <button class="btn-primary" onclick="resetQuiz()">&#8635; Retake Quiz</button>
    <button onclick="reviewAnswers()">&#128269; Review Answers</button>
  </div>
</div>

{n:300,s:"E",q:"ESP32 is best described as:",opts:["Powerful IoT microcontroller with wireless connectivity","Desktop computer","Printer device","Optical drive"],ans:0}
];

const LABELS = ["A","B","C","D"];
const SECTION_NAMES = {A:"General IoT",B:"MQTT",C:"OSPF & BGP",D:"LoRa",E:"ESP32"};
const PER_PAGE = 10;
let questions = [];
let answers = {};
let page = 0;
let activeSection = "all";
let reviewMode = false;

function shuffle(arr) {
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function buildQuestions() {
  questions = RAW
    .filter(q => activeSection === "all" || q.s === activeSection)
    .map(q => {
      const correct = q.opts[q.ans];
      const shuffled = shuffle(q.opts);
      return { ...q, shuffled, correct };
    });
}

function totalPages() { return Math.ceil(questions.length / PER_PAGE); }
function pageQs() { return questions.slice(page * PER_PAGE, (page+1) * PER_PAGE); }

function countAnswered() { return Object.keys(answers).filter(k => questions.find(q => q.n == k)).length; }
function countCorrect() {
  return Object.keys(answers).filter(k => {
    const q = questions.find(q => q.n == k);
    return q && q.shuffled[answers[k]] === q.correct;
  }).length;
}

function updateStats() {
  const total = questions.length;
  const answered = countAnswered();
  const correct = countCorrect();
  const wrong = answered - correct;
  document.getElementById("st-total").textContent = total;
  document.getElementById("st-answered").textContent = answered;
  document.getElementById("st-correct").textContent = correct;
  document.getElementById("st-wrong").textContent = wrong;
  document.getElementById("prog-fill").style.width = (total > 0 ? Math.round(answered/total*100) : 0) + "%";
  document.getElementById("prog-label").textContent = answered + " / " + total + " answered";
  document.getElementById("finish-btn").style.display = (answered === total && total > 0) ? "inline-block" : "none";
}

function render() {
  const container = document.getElementById("q-container");
  container.innerHTML = "";
  pageQs().forEach(q => {
    const ua = answers[q.n];
    const answered = ua !== undefined;
    const isCorrect = answered && q.shuffled[ua] === q.correct;

    const card = document.createElement("div");
    card.className = "q-card" + (answered ? (isCorrect ? " correct-card" : " wrong-card") : "");

    const optionsHTML = q.shuffled.map((opt, i) => {
      let cls = "opt";
      if (answered || reviewMode) {
        if (opt === q.correct) cls += reviewMode && !answered ? " opt-reveal" : " opt-correct";
        else if (answered && i === ua) cls += " opt-wrong";
      }
      const disabled = (answered || reviewMode) ? "disabled" : "";
      return `<button class="${cls}" ${disabled} onclick="pick(${q.n}, ${i})">
        <span class="opt-label">${LABELS[i]}</span>${opt}
      </button>`;
    }).join("");

    let feedbackHTML = "";
    if (answered) {
      feedbackHTML = `<div class="feedback ${isCorrect ? 'fb-correct' : 'fb-wrong'}">
        ${isCorrect ? "✓ Correct!" : "✗ Wrong — correct answer: " + q.correct}
      </div>`;
    } else if (reviewMode) {
      feedbackHTML = `<div class="feedback fb-correct">Correct answer: ${q.correct}</div>`;
    }

    card.innerHTML = `
      <div class="q-header">
        <span class="q-num">Q${q.n}</span>
        <span class="q-badge">${SECTION_NAMES[q.s]}</span>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="options">${optionsHTML}</div>
      ${feedbackHTML}
    `;
    container.appendChild(card);
  });
  document.getElementById("page-info").textContent = "Page " + (page+1) + " / " + totalPages();
  updateStats();
}

function pick(qn, idx) {
  if (answers[qn] !== undefined) return;
  answers[qn] = idx;
  render();
}

function prevPage() { if(page > 0){page--;render();window.scrollTo({top:0,behavior:"smooth"});} }
function nextPage() { if(page < totalPages()-1){page++;render();window.scrollTo({top:0,behavior:"smooth"});} }

function showResults() {
  document.getElementById("quiz-main").style.display = "none";
  document.getElementById("results").style.display = "block";
  const total = questions.length;
  const correct = countCorrect();
  const answered = countAnswered();
  const wrong = answered - correct;
  const skipped = total - answered;
  const pct = Math.round(correct / total * 100);

  document.getElementById("res-pct").textContent = pct + "%";
  document.getElementById("res-frac").textContent = correct + "/" + total;
  document.getElementById("res-correct").textContent = correct;
  document.getElementById("res-wrong").textContent = wrong;
  document.getElementById("res-skip").textContent = skipped;

  const arc = document.getElementById("ring-arc");
  const circumference = 2 * Math.PI * 60;
  arc.setAttribute("stroke-dashoffset", circumference - (circumference * pct / 100));

  const grades = [[90,"Excellent 🎉","Outstanding performance!"],[75,"Good 👍","Well done — keep it up!"],[60,"Pass ✓","Good effort — review weak areas."],[0,"Needs Work 📖","Study the material and try again."]];
  const [,grade,msg] = grades.find(([t]) => pct >= t);
  document.getElementById("res-grade").textContent = grade;
  document.getElementById("res-msg").textContent = msg;
  window.scrollTo({top:0, behavior:"smooth"});
}

function reviewAnswers() {
  reviewMode = true;
  document.getElementById("results").style.display = "none";
  document.getElementById("quiz-main").style.display = "block";
  page = 0;
  render();
}

function resetQuiz() {
  reviewMode = false;
  answers = {};
  page = 0;
  buildQuestions();
  document.getElementById("results").style.display = "none";
  document.getElementById("quiz-main").style.display = "block";
  render();
}

function filterSection() {
  activeSection = document.getElementById("section-sel").value;
  answers = {};
  page = 0;
  reviewMode = false;
  buildQuestions();
  document.getElementById("results").style.display = "none";
  document.getElementById("quiz-main").style.display = "block";
  render();
}

buildQuestions();
render();
</script>
</body>
</html>
