<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Administration 2 — Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2433;
    --border: #2d3748;
    --border2: #3d4f66;
    --accent: #58a6ff;
    --accent2: #388bfd;
    --green: #3fb950;
    --green-bg: #0d2818;
    --green-border: #1a4731;
    --green-text: #56d364;
    --red: #f85149;
    --red-bg: #2d0e0e;
    --red-border: #5c1a1a;
    --red-text: #ff7b72;
    --purple: #bc8cff;
    --purple-bg: #1c0d38;
    --yellow: #e3b341;
    --text: #e6edf3;
    --text2: #8b949e;
    --text3: #6e7681;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  /* ── HEADER ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    background: rgba(13,17,23,0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }
  .logo {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: .04em;
    white-space: nowrap;
  }
  .logo span { color: var(--text3); }
  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  #header-score {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text2);
    display: none;
  }
  #header-score b { color: var(--green-text); }
  .progress-track {
    width: 160px;
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--purple));
    border-radius: 2px;
    transition: width .4s ease;
    width: 0%;
  }

  /* ── LAYOUT ── */
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* ── START SCREEN ── */
  #start-screen { text-align: center; padding: 40px 0; }
  .start-icon {
    width: 72px; height: 72px;
    margin: 0 auto 28px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
  }
  .start-title {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -.02em;
    margin-bottom: 10px;
  }
  .start-sub {
    color: var(--text2);
    font-size: 15px;
    margin-bottom: 36px;
    line-height: 1.7;
  }
  .stat-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-bottom: 36px;
  }
  .pill {
    font-family: var(--mono);
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
  }
  .pill b { color: var(--text); }
  .btn-start {
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 500;
    padding: 13px 40px;
    border-radius: 10px;
    background: var(--accent2);
    color: #fff;
    border: none;
    cursor: pointer;
    transition: background .15s, transform .1s;
    letter-spacing: .01em;
  }
  .btn-start:hover { background: var(--accent); transform: translateY(-1px); }
  .btn-start:active { transform: scale(.98); }

  /* ── QUIZ SCREEN ── */
  #quiz-screen { display: none; }

  .q-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .q-num {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text3);
  }
  .badge {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 4px;
    letter-spacing: .04em;
  }
  .badge-mcq { background: var(--purple-bg); color: var(--purple); border: 1px solid #3d2566; }
  .badge-tf  { background: #0d2433; color: #79c0ff; border: 1px solid #1a3d52; }

  .q-text {
    font-size: 18px;
    font-weight: 500;
    line-height: 1.65;
    margin-bottom: 28px;
    color: var(--text);
    letter-spacing: -.01em;
  }

  .options { display: flex; flex-direction: column; gap: 10px; }

  .opt {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 18px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    transition: border-color .15s, background .15s;
    text-align: left;
    width: 100%;
    font-family: var(--sans);
    font-size: 14px;
    color: var(--text);
    line-height: 1.55;
  }
  .opt:hover:not(:disabled) {
    border-color: var(--border2);
    background: var(--surface2);
  }
  .opt:disabled { cursor: default; }

  .opt-key {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    min-width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    border: 1px solid var(--border2);
    color: var(--text3);
    flex-shrink: 0;
    margin-top: 1px;
    transition: all .15s;
  }

  .opt.correct {
    border-color: var(--green-border);
    background: var(--green-bg);
  }
  .opt.correct .opt-key {
    background: var(--green);
    border-color: var(--green);
    color: #000;
  }
  .opt.correct .opt-label { color: var(--green-text); }

  .opt.wrong {
    border-color: var(--red-border);
    background: var(--red-bg);
  }
  .opt.wrong .opt-key {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
  }
  .opt.wrong .opt-label { color: var(--red-text); }

  .opt.reveal {
    border-color: var(--green-border);
    background: var(--green-bg);
    opacity: .7;
  }
  .opt.reveal .opt-key { background: var(--green); border-color: var(--green); color: #000; }
  .opt.reveal .opt-label { color: var(--green-text); }

  /* feedback */
  .feedback {
    margin-top: 18px;
    padding: 14px 18px;
    border-radius: 10px;
    font-size: 13.5px;
    line-height: 1.6;
    display: none;
    animation: fadeIn .2s ease;
  }
  .feedback.correct { background: var(--green-bg); border: 1px solid var(--green-border); color: var(--green-text); }
  .feedback.wrong   { background: var(--red-bg);   border: 1px solid var(--red-border);   color: var(--red-text); }
  .feedback-icon { font-size: 16px; margin-right: 6px; }

  .action-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 28px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .streak-display {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text3);
  }
  .streak-display b { color: var(--yellow); }

  .btn-next {
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 500;
    padding: 10px 28px;
    border-radius: 8px;
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border2);
    cursor: pointer;
    transition: background .15s, border-color .15s;
    display: none;
    margin-left: auto;
  }
  .btn-next:hover { background: var(--border); }

  /* ── ANALYTICS SCREEN ── */
  #analytics-screen { display: none; animation: fadeIn .4s ease; }

  .result-hero {
    text-align: center;
    padding: 48px 0 40px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 36px;
  }
  .result-pct {
    font-family: var(--mono);
    font-size: 72px;
    font-weight: 300;
    letter-spacing: -.04em;
    line-height: 1;
    margin-bottom: 10px;
  }
  .result-pct.grade-a { color: var(--green-text); }
  .result-pct.grade-b { color: var(--accent); }
  .result-pct.grade-c { color: var(--yellow); }
  .result-pct.grade-d { color: var(--red-text); }
  .result-grade {
    font-size: 16px;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 6px;
  }
  .result-detail {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text3);
  }

  .metrics {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 12px;
    margin-bottom: 36px;
  }
  .metric {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    text-align: center;
  }
  .metric-val {
    font-family: var(--mono);
    font-size: 26px;
    font-weight: 400;
    margin-bottom: 4px;
  }
  .metric-lbl {
    font-size: 11.5px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: .06em;
  }

  /* bar chart */
  .section-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 14px;
  }
  .chart { margin-bottom: 36px; }
  .bar-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
    font-size: 13px;
  }
  .bar-lbl { width: 90px; text-align: right; color: var(--text2); font-size: 12.5px; flex-shrink: 0; }
  .bar-track {
    flex: 1;
    height: 20px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width .8s cubic-bezier(.4,0,.2,1);
  }
  .bar-fill.b-green { background: linear-gradient(90deg, #1a4731, var(--green)); }
  .bar-fill.b-red   { background: linear-gradient(90deg, #5c1a1a, var(--red)); }
  .bar-fill.b-blue  { background: linear-gradient(90deg, var(--accent2), var(--purple)); }
  .bar-pct { font-family: var(--mono); font-size: 12px; color: var(--text2); width: 36px; }

  /* review list */
  .review-section { margin-bottom: 40px; }
  .review-item {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 10px;
    font-size: 13.5px;
  }
  .review-item.ri-wrong { border-color: var(--red-border); background: var(--red-bg); }
  .review-item.ri-correct { border-color: var(--green-border); background: var(--green-bg); }
  .ri-q { font-weight: 500; margin-bottom: 8px; line-height: 1.55; }
  .ri-wrong .ri-q { color: var(--red-text); }
  .ri-correct .ri-q { color: var(--green-text); }
  .ri-ans { font-size: 12.5px; color: var(--text2); line-height: 1.7; }
  .ri-ans b { color: var(--text); }
  .ri-tag {
    display: inline-block;
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 3px;
    margin-right: 8px;
    vertical-align: middle;
  }
  .tag-w { background: var(--red-border); color: var(--red-text); }
  .tag-c { background: var(--green-border); color: var(--green-text); }

  .btn-restart {
    display: block;
    margin: 0 auto;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: .04em;
    padding: 13px 40px;
    border-radius: 8px;
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent2);
    cursor: pointer;
    transition: background .15s;
  }
  .btn-restart:hover { background: rgba(56,139,253,.12); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @media (max-width: 480px) {
    .q-text { font-size: 16px; }
    .result-pct { font-size: 54px; }
    header { padding: 14px 16px; }
    main { padding: 24px 16px 60px; }
    .progress-track { width: 100px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">SysAdmin<span>/</span>2</div>
  <div class="header-right">
    <div id="header-score"></div>
    <div class="progress-track"><div class="progress-fill" id="prog"></div></div>
  </div>
</header>

<main>

  <!-- START -->
  <div id="start-screen">
    <div class="start-icon">🖥️</div>
    <h1 class="start-title">System Administration 2</h1>
    <p class="start-sub">Full question bank covering Linux commands, file system hierarchy,<br>permissions, user management, and RHEL 9 requirements.</p>
    <div class="stat-pills">
      <div class="pill"><b>69</b> questions</div>
      <div class="pill"><b>37</b> multiple choice</div>
      <div class="pill"><b>32</b> true / false</div>
      <div class="pill">shuffled every attempt</div>
    </div>
    <button class="btn-start" onclick="startQuiz()">Start Quiz →</button>
  </div>

  <!-- QUIZ -->
  <div id="quiz-screen">
    <div class="q-meta">
      <span class="q-num" id="q-num">Question 1 of 69</span>
      <span class="badge" id="q-badge">MCQ</span>
    </div>
    <div class="q-text" id="q-text"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <div class="action-row">
      <div class="streak-display" id="streak-display"></div>
      <button class="btn-next" id="btn-next" onclick="nextQ()">Next →</button>
    </div>
  </div>

  <!-- ANALYTICS -->
  <div id="analytics-screen">
    <div class="result-hero">
      <div class="result-pct" id="res-pct"></div>
      <div class="result-grade" id="res-grade"></div>
      <div class="result-detail" id="res-detail"></div>
    </div>
    <div class="metrics" id="metrics"></div>
    <div class="chart" id="chart"></div>
    <div id="review-wrong"></div>
    <div id="review-correct"></div>
    <button class="btn-restart" onclick="restart()">↺ restart</button>
  </div>

</main>

<script>
const KEYS = ['A','B','C','D'];

const ALL_Q = [
  {t:"mcq",q:"Which of the below is used to create a directory?",opts:["mk directory","mkdir directory","rm directory","mv directory"],ans:1},
  {t:"mcq",q:"Which of the following is used to copy a file?",opts:["cp file new-file","mv file new-file","rm file new-file","rmdir directory"],ans:0},
  {t:"mcq",q:"Which of the following is used to copy a directory and its contents?",opts:["mv file new-file","rm file","cp -r directory new-directory","rm -r directory"],ans:2},
  {t:"mcq",q:"Which of the below is used to move or rename a file or directory?",opts:["cp file new-file","mv file new-file","rm file new-file","rmdir directory"],ans:1},
  {t:"mcq",q:"Which of the following is used to remove a file?",opts:["rm file","mv file new-file","cp file new-file","rmdir directory"],ans:0},
  {t:"mcq",q:"Which of the following commands removes a directory and all of its contents?",opts:["rm -r directory","rmdir directory","mv directory new-directory","cp -r directory new-directory"],ans:0},
  {t:"mcq",q:"Which command removes an empty directory?",opts:["rm directory","rm -r directory","rmdir directory","mv directory new-directory"],ans:2},
  {t:"tf",q:"rmv file is used to remove a file in Linux.",opts:["True","False"],ans:1,note:"The correct command is rm, not rmv."},
  {t:"mcq",q:"Which VMware virtual network type uses the same IP address range and subnet mask?",opts:["NAT mode","Bridge mode","Local mode","None"],ans:1},
  {t:"mcq",q:"Which VMware virtual network type creates an isolated network where VMs can communicate only with the host and each other, with no internet connectivity?",opts:["NAT mode","Bridge mode","Local Host","Host Only mode"],ans:3},
  {t:"mcq",q:"Which command will change the working directory to /tmp if the current working directory is /home/student?",opts:["cd .","cd ../../tmp","cd -/tmp","cd tmp"],ans:1},
  {t:"tf",q:"cp -r directory new-directory is used to copy a directory without its content in Linux.",opts:["True","False"],ans:1,note:"It copies the directory AND its contents."},
  {t:"tf",q:"rmdir directory removes an empty directory.",opts:["True","False"],ans:0},
  {t:"tf",q:"rmdir directory can remove a directory that contains files.",opts:["True","False"],ans:1,note:"rmdir only works on empty directories."},
  {t:"tf",q:"rm -r directory removes a directory and all files within it.",opts:["True","False"],ans:0},
  {t:"tf",q:"mv file new-file moves or renames a file or directory.",opts:["True","False"],ans:0},
  {t:"tf",q:"cp -r directory new-directory copies only the directory itself, not its contents.",opts:["True","False"],ans:1,note:"It copies the directory and its contents."},
  {t:"mcq",q:"Which directory contains installed software programs and libraries?",opts:["/var","/usr","/lib","/etc"],ans:1},
  {t:"mcq",q:"Which command will always return you to the working directory used prior to the current working directory?",opts:["cd ..","cd /","cd –","cd ~"],ans:2},
  {t:"mcq",q:"Which command will always change the working directory up two levels from the current location?",opts:["cd ../..","cd ../../..","cd ..","cd /.."],ans:0},
  {t:"mcq",q:"Which directory contains dynamic data, such as for databases and websites?",opts:["/var","/usr","/home","/etc"],ans:0},
  {t:"mcq",q:"Which directory is the top of the system's file system hierarchy?",opts:["/root","/home","/","/bin"],ans:2},
  {t:"mcq",q:"Which directory contains persistent, system-specific configuration data?",opts:["/opt","/etc","/usr","/run"],ans:1},
  {t:"mcq",q:"Which command is used to return to the current user's home directory, assuming the current working directory is /tmp?",opts:["cd /home/user","cd /user","cd","cd /etc"],ans:2},
  {t:"mcq",q:"Which directory contains regular commands and utilities?",opts:["/bin","/usr/bin","/sbin","/usr/local/bin"],ans:1},
  {t:"mcq",q:"Which command lists files in the current location, using a long format, and including hidden files?",opts:["ls -l","ls -a","ls -al","ls -lh"],ans:2},
  {t:"mcq",q:"Which command returns you to the working directory before the current working directory?",opts:["cd –","cd -p","cd .","cd .."],ans:0},
  {t:"mcq",q:"What option must be used with rm to delete a directory and all its contents recursively?",opts:["-f","-r","-p","-a"],ans:1},
  {t:"mcq",q:"Using the command touch file1 file2 file3 — what happens if the files already exist?",opts:["Delete the files","Rename the files","Reset their timestamps","Copy the files"],ans:2},
  {t:"tf",q:"The touch command can create an empty file or update the timestamp of an existing file.",opts:["True","False"],ans:0},
  {t:"tf",q:"The cp command is used solely for copying files, not directories.",opts:["True","False"],ans:1,note:"cp can also copy directories using the -r flag."},
  {t:"mcq",q:"What is the minimum RAM requirement for RHEL 9?",opts:["2 GB","4 GB","8 GB","16 GB"],ans:0},
  {t:"mcq",q:"What is the minimum disk space requirement for RHEL 9?",opts:["15 GB","20 GB","30 GB","60 GB"],ans:1},
  {t:"mcq",q:"What is the minimum space for root (/) required for RHEL 9?",opts:["5 GB","8 GB","10 GB","20 GB"],ans:2},
  {t:"mcq",q:"What is the minimum swap space required for RHEL 9?",opts:["1 GB","2 GB","3 GB","4 GB"],ans:0},
  {t:"mcq",q:"What is the minimum space for /home required for RHEL 9?",opts:["1 GB","2 GB","3 GB","4 GB"],ans:3},
  {t:"mcq",q:"What is the minimum space for /boot required for RHEL 9?",opts:["512 MB","1024 MB","2048 MB","4096 MB"],ans:0},
  {t:"tf",q:"Users may also have supplementary groups. Membership in supplementary groups is determined by the /etc/shadow file.",opts:["True","False"],ans:1,note:"It is determined by /etc/group."},
  {t:"tf",q:"chmod is the command that affects directories to allow the contents of the directory to be accessed.",opts:["True","False"],ans:1,note:"That behaviour is the x (execute) permission bit, not chmod (chmod is the command used to change permissions)."},
  {t:"mcq",q:"What permission bit affects files so that the contents of the file can be read?",opts:["w (write)","x (execute)","r (read)"],ans:2},
  {t:"tf",q:"UID 1–200 is a range of system users assigned statically to system processes by Red Hat.",opts:["True","False"],ans:0},
  {t:"mcq",q:"Users may also have supplementary groups. Membership in supplementary groups is determined by which file?",opts:["/etc/group","/etc/shadow","/etc/passwd"],ans:0},
  {t:"tf",q:"w (write) is the permission that allows the contents of a file to be changed.",opts:["True","False"],ans:0},
  {t:"tf",q:"There are only two main types of user accounts: the superuser and system users.",opts:["True","False"],ans:1,note:"There are three types: superuser, system users, and regular users."},
  {t:"mcq",q:"Which UID range is available for assignment to regular users?",opts:["UID 0","UID 1–200","UID 201–999","UID 1000+"],ans:3},
  {t:"tf",q:"The system distinguishes user accounts by the unique identification number assigned to them, the user ID or UID.",opts:["True","False"],ans:0},
  {t:"mcq",q:"Which UID range is assigned statically to system processes by Red Hat?",opts:["UID 0","UID 1–200","UID 201–999","UID 1000+"],ans:1},
  {t:"tf",q:"Users may also have supplementary groups. Membership in supplementary groups is determined by the /etc/group file.",opts:["True","False"],ans:0},
  {t:"mcq",q:"UID 0 is always assigned to which account?",opts:["system users","superuser","regular users"],ans:1},
  {t:"tf",q:"The /etc/passwd file stores the user's password in encrypted format.",opts:["True","False"],ans:1,note:"Passwords are stored in /etc/shadow, not /etc/passwd."},
  {t:"tf",q:"x (execute) on directories allows the contents of the directory to be accessed — you can change into it, read info about its files, and access files.",opts:["True","False"],ans:0},
  {t:"tf",q:"The command groupdel group0022 is used for deleting groups from the command line.",opts:["True","False"],ans:0},
  {t:"tf",q:"There are three main types of user account: the superuser, system users, and regular users.",opts:["True","False"],ans:0},
  {t:"mcq",q:"Which permission bit on directories allows the directory's contents (file names) to be listed?",opts:["r (read)","x (execute)","w (write)"],ans:0},
  {t:"mcq",q:"Which permission bit allows a file to be executed as a command?",opts:["r (read)","w (write)","x (execute)"],ans:2},
  {t:"tf",q:"A user account is used to provide security boundaries between different people and programs that can run commands.",opts:["True","False"],ans:0},
  {t:"tf",q:"UID 201–999 is used by system processes that do not own files on the file system and are typically assigned dynamically.",opts:["True","False"],ans:0},
  {t:"tf",q:"The /etc/shadow file stores the user's password in encrypted format.",opts:["True","False"],ans:0},
  {t:"tf",q:"UID 0 is always assigned to the superuser account, root.",opts:["True","False"],ans:0},
  {t:"tf",q:"r (read) is the permission that allows the contents of a file to be changed.",opts:["True","False"],ans:1,note:"Changing file contents requires w (write), not r (read)."},
  {t:"tf",q:"The command groupmod -n group0022 group02 is used for modifying existing groups from the command line.",opts:["True","False"],ans:0},
  {t:"mcq",q:"Which UID is always assigned to the superuser account, root?",opts:["UID 0","UID 1–200","UID 201–999","UID 1000+"],ans:0},
  {t:"mcq",q:"What permission on directories allows the directory's file names to be listed?",opts:["r (read)","w (write)","x (execute)"],ans:0},
  {t:"mcq",q:"What is the command for modifying existing groups from the command line?",opts:["groupdel group0022","sudo groupadd -g 10000 group01","groupmod -n group0022 group02"],ans:2},
  {t:"tf",q:"The command sudo groupadd -g 10000 group01 is used for creating groups from the command line.",opts:["True","False"],ans:0},
  {t:"tf",q:"/etc/passwd file is used to store information about local users.",opts:["True","False"],ans:0},
  {t:"mcq",q:"What command is used to change file and directory permissions?",opts:["r (read)","w (write)","x (execute)","chmod"],ans:3}
];

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

let questions=[], cur=0, score=0, streak=0, maxStreak=0, userAnswers=[];

function startQuiz(){
  questions = shuffle([...ALL_Q]);
  cur=0; score=0; streak=0; maxStreak=0; userAnswers=[];
  document.getElementById('start-screen').style.display='none';
  document.getElementById('quiz-screen').style.display='block';
  document.getElementById('header-score').style.display='flex';
  render();
}

function render(){
  const q = questions[cur];
  const pct = Math.round((cur/questions.length)*100);
  document.getElementById('prog').style.width = pct+'%';
  document.getElementById('q-num').textContent = 'Question '+(cur+1)+' of '+questions.length;
  const badge = document.getElementById('q-badge');
  badge.textContent = q.t==='mcq' ? 'MCQ' : 'True / False';
  badge.className = 'badge '+(q.t==='mcq'?'badge-mcq':'badge-tf');
  document.getElementById('q-text').textContent = q.q;
  updateHeaderScore();

  const opts = document.getElementById('options');
  opts.innerHTML='';
  q.opts.forEach((o,i)=>{
    const btn = document.createElement('button');
    btn.className='opt';
    btn.innerHTML=`<span class="opt-key">${KEYS[i]||i+1}</span><span class="opt-label">${o}</span>`;
    btn.onclick=()=>choose(i);
    opts.appendChild(btn);
  });

  const fb = document.getElementById('feedback');
  fb.style.display='none';
  fb.className='feedback';
  document.getElementById('btn-next').style.display='none';
  updateStreak();
}

function choose(idx){
  const q = questions[cur];
  const btns = document.querySelectorAll('.opt');
  btns.forEach(b=>b.disabled=true);
  const correct = idx===q.ans;
  if(correct){score++;streak++;if(streak>maxStreak)maxStreak=streak;}
  else{streak=0;}
  userAnswers.push({q,chosen:idx,correct});
  btns[idx].classList.add(correct?'correct':'wrong');
  if(!correct) btns[q.ans].classList.add('reveal');

  const fb = document.getElementById('feedback');
  fb.style.display='block';
  fb.className='feedback '+(correct?'correct':'wrong');
  if(correct){
    fb.innerHTML='<span class="feedback-icon">✓</span> Correct!';
  } else {
    const note = q.note ? ' '+q.note : ' The correct answer is: <strong>'+q.opts[q.ans]+'</strong>';
    fb.innerHTML='<span class="feedback-icon">✗</span> Incorrect. '+note;
  }

  const nb = document.getElementById('btn-next');
  nb.style.display='inline-block';
  nb.textContent = (cur+1 < questions.length) ? 'Next →' : 'See results →';
  updateStreak();
  updateHeaderScore();
}

function updateStreak(){
  const el=document.getElementById('streak-display');
  if(streak>=3){el.innerHTML='🔥 Streak: <b>'+streak+'</b>';}
  else{el.textContent='';}
}
function updateHeaderScore(){
  const el=document.getElementById('header-score');
  el.innerHTML='<b>'+score+'</b> / '+(cur+(userAnswers.length>cur?1:0));
}

function nextQ(){
  cur++;
  if(cur>=questions.length){showAnalytics();return;}
  render();
}

function showAnalytics(){
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('prog').style.width='100%';
  const el = document.getElementById('analytics-screen');
  el.style.display='block';

  const pct = Math.round((score/questions.length)*100);
  const wrong = questions.length-score;
  const mcqTotal = questions.filter(q=>q.t==='mcq').length;
  const tfTotal  = questions.filter(q=>q.t==='tf').length;
  const mcqRight = userAnswers.filter(a=>a.q.t==='mcq'&&a.correct).length;
  const tfRight  = userAnswers.filter(a=>a.q.t==='tf'&&a.correct).length;

  let gradeClass='grade-d', gradeText='Keep studying';
  if(pct>=90){gradeClass='grade-a';gradeText='Outstanding!';}
  else if(pct>=75){gradeClass='grade-b';gradeText='Good job!';}
  else if(pct>=60){gradeClass='grade-c';gradeText='Almost there!';}

  document.getElementById('res-pct').textContent=pct+'%';
  document.getElementById('res-pct').className='result-pct '+gradeClass;
  document.getElementById('res-grade').textContent=gradeText;
  document.getElementById('res-detail').textContent=score+' correct · '+wrong+' wrong · '+questions.length+' total · best streak '+maxStreak;

  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="metric-val" style="color:var(--green-text)">${score}</div><div class="metric-lbl">Correct</div></div>
    <div class="metric"><div class="metric-val" style="color:var(--red-text)">${wrong}</div><div class="metric-lbl">Wrong</div></div>
    <div class="metric"><div class="metric-val" style="color:var(--accent)">${mcqRight}/${mcqTotal}</div><div class="metric-lbl">MCQ</div></div>
    <div class="metric"><div class="metric-val" style="color:var(--purple)">${tfRight}/${tfTotal}</div><div class="metric-lbl">True / False</div></div>
    <div class="metric"><div class="metric-val" style="color:var(--yellow)">${maxStreak}</div><div class="metric-lbl">Best streak</div></div>
  `;

  const mcqPct=Math.round((mcqRight/mcqTotal)*100);
  const tfPct=Math.round((tfRight/tfTotal)*100);
  document.getElementById('chart').innerHTML=`
    <div class="section-label">Performance breakdown</div>
    <div class="bar-row">
      <span class="bar-lbl">Overall</span>
      <div class="bar-track"><div class="bar-fill b-blue" style="width:${pct}%"></div></div>
      <span class="bar-pct">${pct}%</span>
    </div>
    <div class="bar-row">
      <span class="bar-lbl">MCQ</span>
      <div class="bar-track"><div class="bar-fill b-green" style="width:${mcqPct}%"></div></div>
      <span class="bar-pct">${mcqPct}%</span>
    </div>
    <div class="bar-row">
      <span class="bar-lbl">True / False</span>
      <div class="bar-track"><div class="bar-fill b-green" style="width:${tfPct}%"></div></div>
      <span class="bar-pct">${tfPct}%</span>
    </div>
  `;

  const wrongItems = userAnswers.filter(a=>!a.correct);
  const correctItems = userAnswers.filter(a=>a.correct);

  let wrongHTML=`<div class="review-section"><div class="section-label" style="margin-bottom:14px">To review (${wrongItems.length})</div>`;
  if(wrongItems.length===0){ wrongHTML+='<p style="color:var(--text3);font-size:13px;">Perfect score on all questions! 🎉</p>';}
  wrongItems.forEach(a=>{
    wrongHTML+=`<div class="review-item ri-wrong">
      <div class="ri-q"><span class="ri-tag tag-w">WRONG</span>${a.q.q}</div>
      <div class="ri-ans">Your answer: <b>${a.q.opts[a.chosen]}</b><br>Correct answer: <b>${a.q.opts[a.q.ans]}</b>${a.q.note?' — '+a.q.note:''}</div>
    </div>`;
  });
  wrongHTML+='</div>';
  document.getElementById('review-wrong').innerHTML=wrongHTML;

  let correctHTML=`<div class="review-section"><div class="section-label" style="margin-bottom:14px">Correct answers (${correctItems.length})</div>`;
  correctItems.forEach(a=>{
    correctHTML+=`<div class="review-item ri-correct">
      <div class="ri-q"><span class="ri-tag tag-c">CORRECT</span>${a.q.q}</div>
      <div class="ri-ans">Your answer: <b>${a.q.opts[a.chosen]}</b></div>
    </div>`;
  });
  correctHTML+='</div>';
  document.getElementById('review-correct').innerHTML=correctHTML;
}

function restart(){
  document.getElementById('analytics-screen').style.display='none';
  startQuiz();
}
</script>
